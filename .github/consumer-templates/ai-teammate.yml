# AI Teammate — runs spec-kit pipeline and delegates to Copilot Coding Agent.
# Triggered by Scrum Master via workflow_dispatch.
# Delegates all logic to the shared SDLCAgents reusable workflow.
#
# Parallel job uploads ai-teammate-<key>-workflow-dispatch-inputs (JSON of the three workflow_dispatch inputs).
name: AI Teammate
run-name: "${{ inputs.concurrency_key }} · AI Teammate"

concurrency:
  group: ai-teammate-${{ inputs.concurrency_key }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      concurrency_key:
        description: "Jira issue key (used for concurrency grouping)"
        required: true
        type: string
      config_file:
        description: "Path to agent JSON in repo (e.g. config/workflows/ai-teammate/ai-teammate.config)"
        required: true
        type: string
      caller_config:
        description: >-
          Caller payload: URL-encoded JSON { "params": { "inputJql": "key = PROJ-1", "customParams": { ... } } }
        required: true
        type: string

jobs:
  workflow_dispatch_inputs_artifact:
    name: Snapshot workflow_dispatch inputs
    runs-on: ubuntu-latest
    steps:
      - name: Write workflow_dispatch inputs (for artifact)
        env:
          concurrency_key: ${{ inputs.concurrency_key }}
          config_file: ${{ inputs.config_file }}
          caller_config: ${{ inputs.caller_config }}
        run: |
          set -euo pipefail
          mkdir -p workflow-dispatch-inputs-artifact
          node <<'NODE'
          const fs = require('fs');
          const out = {
            concurrency_key: process.env.concurrency_key,
            config_file: process.env.config_file,
            caller_config: process.env.caller_config,
          };
          fs.writeFileSync(
            'workflow-dispatch-inputs-artifact/workflow_dispatch_inputs.json',
            JSON.stringify(out, null, 2) + '\n',
          );
          NODE

      - name: Upload workflow_dispatch inputs
        uses: actions/upload-artifact@v4
        with:
          name: ai-teammate-${{ inputs.concurrency_key }}-workflow-dispatch-inputs
          path: workflow-dispatch-inputs-artifact/
          if-no-files-found: error

  call:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-ai-teammate.yml@master
    with:
      concurrency_key: ${{ inputs.concurrency_key }}
      config_file: ${{ inputs.config_file }}
      caller_config: ${{ inputs.caller_config }}
    secrets: inherit
