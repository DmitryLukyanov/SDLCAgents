# Copilot Coding Agent environment setup — runs before Copilot starts on a task.
# Default branch must contain this file. See:
# https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
#
# Optional (GitHub Copilot / upstream spec-kit only): speckit.*.agent.md and speckit.*.prompt.md.
# Codex pipelines use .agents/skills/speckit-*/SKILL.md from SDLC onboarding instead.
name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.COPILOT_PAT }}@github.com/".insteadOf "https://github.com/"
