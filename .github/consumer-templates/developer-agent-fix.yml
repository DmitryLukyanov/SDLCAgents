# Developer Agent — Fix.
# Triggered by PR Comment Handler when /fix <instructions> is posted on a spec-kit PR.
# Delegates all logic to the shared SDLCAgents reusable workflow.
#
# Required secrets (Settings > Secrets and variables > Actions):
#   COPILOT_PAT      — GitHub Classic PAT with repo + workflow + pull-requests scopes
#   OPENAI_API_KEY   — OpenAI API key (used by Codex CLI, the default LLM provider)
name: Developer Agent — Fix
run-name: "Developer Agent — Fix (PR #${{ inputs.pr_number }})"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number where /fix was commented"
        required: true
        type: string
      fix_comment_body:
        description: "Full comment body starting with /fix — prefix is stripped by the reusable workflow"
        required: true
        type: string

jobs:
  call:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-developer-agent-fix.yml@master
    with:
      pr_number:        ${{ fromJson(inputs.pr_number) }}
      fix_comment_body: ${{ inputs.fix_comment_body }}
    secrets: inherit
