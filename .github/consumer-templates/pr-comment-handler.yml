# PR Comment Handler — pure router.
#
# Listens for comments on PRs and dispatches the appropriate consumer
# workflow based on the slash command:
#
#   /proceed   → developer-agent-proceed.yml
#   /fix <…>   → developer-agent-fix.yml
#
# NOTE: GitHub's issue_comment event covers both issues and PRs.
# The `pull_request != null` guard ensures only PR comments are handled.
#
# Required secrets (Settings > Secrets and variables > Actions):
#   COPILOT_PAT — GitHub Classic PAT with repo + workflow scopes
name: PR Comment Handler
# Keep run-name short — full comment is written to the job Summary by the router script.
run-name: "PR #${{ github.event.issue.number }} · @${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]

jobs:
  route:
    # Skip bot/machine comments — only route comments from human users.
    # github-actions[bot] posts spec gate and agent status comments which
    # also fire issue_comment, but should never be treated as commands.
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.user.type != 'Bot'
    permissions:
      actions: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-pr-comment-handler.yml@master
    with:
      pr_number:      ${{ github.event.issue.number }}
      comment_body:   ${{ github.event.comment.body }}
      default_branch: ${{ github.event.repository.default_branch }}
    secrets: inherit
