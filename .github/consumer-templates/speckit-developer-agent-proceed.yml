# Developer Agent — Proceed.
# Triggered by PR Comment Handler when /proceed is posted on a spec-kit PR.
# Delegates all logic to the shared SDLCAgents reusable workflow.
#
# Required secrets (Settings > Secrets and variables > Actions):
#   COPILOT_PAT — GitHub Classic PAT with repo + workflow + pull-requests scopes
name: Developer Agent — Proceed
run-name: "Developer Agent — Proceed (PR #${{ inputs.pr_number }})"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number where /proceed was commented"
        required: true
        type: string

jobs:
  call:
    permissions:
      contents: read
      pull-requests: read
      actions: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-developer-agent-proceed.yml@master
    with:
      pr_number: ${{ fromJson(inputs.pr_number) }}
    secrets: inherit
