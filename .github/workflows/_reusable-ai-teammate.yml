# Reusable AI Teammate workflow.
# Checks out the calling (consumer) repo for config, SDLCAgents for Node scripts.
#
# Runs the AI Teammate pipeline: prepares spec-kit workspace, creates a GitHub
# issue, runs inline BA analysis (GPT-4o), and assigns Copilot to the issue.
# All pipeline logic lives in TypeScript (ai-teammate-agent.ts).
#
# Usage in consumer repo:
#   jobs:
#     call:
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-ai-teammate.yml@master
#       with:
#         concurrency_key: ${{ inputs.concurrency_key }}
#         config_file: ${{ inputs.config_file }}
#         encoded_config: ${{ inputs.encoded_config }}
#       secrets: inherit
name: "[Reusable] AI Teammate"

on:
  workflow_call:
    inputs:
      concurrency_key:
        description: "Jira issue key (used for concurrency grouping)"
        required: true
        type: string
      config_file:
        description: "Path to agent JSON in consumer repo (e.g. config/workflows/ai-teammate/ai-teammate.config)"
        required: true
        type: string
      encoded_config:
        description: "URL-encoded JSON { params: { inputJql, customParams } }"
        required: true
        type: string
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to pull scripts from"
        required: false
        type: string
        default: 'master'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      COPILOT_PAT:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # ── Step 1: Checkout calling (consumer) repo at workspace root ──────
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      # ── Step 2: Checkout SDLCAgents for Node scripts ────────────────────
      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      # ── Step 3: Check spec-kit prerequisites ────────────────────────────
      - name: Check spec-kit prerequisites
        id: speckit_check
        run: |
          MISSING=0
          for f in \
            .github/agents/speckit.specify.agent.md \
            .github/agents/speckit.implement.agent.md \
            .github/prompts/speckit.specify.prompt.md \
            .github/prompts/speckit.implement.prompt.md; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "speckit_ready=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "⚠️ Spec-kit agent/prompt files are missing from this repo."
            echo "   Run once and commit to the default branch:"
            echo "   uvx --from git+https://github.com/github/spec-kit.git@v0.5.0 specify init --here"
          else
            echo "speckit_ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ Spec-kit agent and prompt files found."
          fi

      # ── Step 4: Node setup + install ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      # ── Step 5: Run agent (CWD = consumer workspace root) ───────────────
      # All logic (spec-kit, issue creation, BA analysis, Copilot assignment) runs in TypeScript.
      # config/spec-kit/defaults.json, config/workflows/ai-teammate/*.json resolve to consumer files.
      - name: Run agent (Spec Kit context + configured runner)
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/ai-teammate-agent.ts
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}

      # ── Step 6: Upload Spec Kit artifacts ───────────────────────────────
      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
