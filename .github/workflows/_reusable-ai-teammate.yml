# Reusable AI Teammate workflow.
# Checks out the calling (consumer) repo for config, SDLCAgents for Node scripts.
#
# Three jobs (Codex BA — avoids GitHub Models rate limits on BA):
#   1. create_github_issue_and_prepare_ba — display name "Create GitHub issue and prepare BA":
#        Jira skip-label check → (a) Jira + spec-kit through `create_github_issue` → `ba-github-issue-prep.json`;
#        if `jira_ba_skip.outputs.skip_reason` non-empty: skip `codex_ba_prepare_prompt` + Codex (no skip file); else prepare prompt + state.
#        No PR here — GitHub Issue only.
#        Artifacts: full `spec-output/<KEY>/` bundle plus optional `*-ba-codex-state` when `ba-codex-state.json` exists.
#   2. ba_codex — `./_reusable-codex-run.yml` writes `ba-codex-output.txt` (skipped when BA not needed)
#   3. finish — parses Codex JSON, posts Jira / GitHub outcome, dispatches Developer Agent
#      (TEMP: dispatch skipped via env in the finish step — flip when re-enabling the downstream workflow).
#
#
# Usage in consumer repo:
#   jobs:
#     call:
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-ai-teammate.yml@master
#       with:
#         concurrency_key: ${{ inputs.concurrency_key }}
#         config_file: ${{ inputs.config_file }}
#         encoded_config: ${{ inputs.encoded_config }}
#       secrets: inherit
name: "[Reusable] AI Teammate"

on:
  workflow_call:
    inputs:
      concurrency_key:
        description: "Jira issue key — must match the key inside encoded_config (artifact paths are spec-output/<this value>/)."
        required: true
        type: string
      config_file:
        description: "Path to agent JSON in consumer repo (e.g. config/workflows/ai-teammate/ai-teammate.config)"
        required: true
        type: string
      encoded_config:
        description: "URL-encoded JSON { params: { inputJql, customParams } }"
        required: true
        type: string
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to pull scripts from"
        required: false
        type: string
        default: 'master'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      COPILOT_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  create_github_issue_and_prepare_ba:
    name: Create GitHub issue and prepare BA
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      run_codex: ${{ steps.ba_flags.outputs.run_codex }}
      skip_reason: ${{ steps.jira_ba_skip.outputs.skip_reason }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      - name: Check spec-kit prerequisites
        id: speckit_check
        uses: ./.github/actions/check-speckit-prerequisites

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      - name: Jira — check BA skip label (run_ba_inline skipIfLabel)
        id: jira_ba_skip
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/check-ba-skip-label-ci.ts
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: AI Teammate — create GitHub issue from placeholder (Jira pipeline through create_github_issue; Issue only, not a PR)
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/ai-teammate-agent.ts
        env:
          AI_TEAMMATE_MODE: codex_ba_create_github_issue
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}

      - name: Codex BA — prepare BA prompt for Codex + post 'BA analysis started' GitHub issue comment (tsx, no LLM; writes ba-codex-prompt.md + ba-codex-state.json for finish)
        if: steps.jira_ba_skip.outputs.skip_reason == ''
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/ai-teammate-agent.ts
        env:
          AI_TEAMMATE_MODE: codex_ba_prepare_prompt
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}

      - name: Decide if Codex BA job should run
        id: ba_flags
        env:
          SKIP_REASON: ${{ steps.jira_ba_skip.outputs.skip_reason }}
        run: |
          if [ -n "${SKIP_REASON}" ]; then
            echo "run_codex=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason set (${SKIP_REASON}) — ba_codex job will be skipped."
          else
            echo "run_codex=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason empty — ba_codex job will run."
          fi

      - name: Upload BA workspace (for Codex + finish)
        uses: actions/upload-artifact@v4
        with:
          name: ai-teammate-ba-${{ inputs.concurrency_key }}-prepare
          path: spec-output/${{ inputs.concurrency_key }}/
          if-no-files-found: error

      # Dedicated artifact so `ba-codex-state.json` is easy to find/download (also included in the bundle above).
      - name: Upload BA checkpoint (ba-codex-state.json)
        uses: actions/upload-artifact@v4
        with:
          name: ai-teammate-ba-${{ inputs.concurrency_key }}-ba-codex-state
          path: spec-output/${{ inputs.concurrency_key }}/ba-codex-state.json
          if-no-files-found: ignore

      - name: Upload Spec Kit artifacts (partial)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-partial-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore

  ba_codex:
    needs: create_github_issue_and_prepare_ba
    if: needs.create_github_issue_and_prepare_ba.outputs.run_codex == 'true'
    uses: ./.github/workflows/_reusable-codex-run.yml
    secrets: inherit
    with:
      download_artifact_name: ai-teammate-ba-${{ inputs.concurrency_key }}-prepare
      download_path: spec-output/${{ inputs.concurrency_key }}
      prompt_file: spec-output/${{ inputs.concurrency_key }}/ba-codex-prompt.md
      output_file: spec-output/${{ inputs.concurrency_key }}/ba-codex-output.txt
      upload_artifact_name: ai-teammate-ba-${{ inputs.concurrency_key }}-post-codex
      upload_path: spec-output/${{ inputs.concurrency_key }}/
      upload_if_no_files_found: error
      codex_model: ${{ vars.BA_CODEX_MODEL }}
      codex_step_name: Run Codex - Business Analyst
      timeout_minutes: 30

  finish:
    needs: [create_github_issue_and_prepare_ba, ba_codex]
    # Run after Codex success, when Codex was skipped (BA not needed), or when Codex failed (finish posts incomplete BA from missing/invalid output).
    if: always() && needs.create_github_issue_and_prepare_ba.result == 'success' && (needs.ba_codex.result == 'success' || needs.ba_codex.result == 'skipped' || needs.ba_codex.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      - name: Download BA workspace (issue + BA prep job)
        uses: actions/download-artifact@v4
        with:
          name: ai-teammate-ba-${{ inputs.concurrency_key }}-prepare
          path: spec-output/${{ inputs.concurrency_key }}

      - name: Download BA workspace (Codex output overlay)
        if: needs.ba_codex.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ai-teammate-ba-${{ inputs.concurrency_key }}-post-codex
          path: spec-output/${{ inputs.concurrency_key }}

      - name: Codex BA — finish (interpret Codex; on success — update GitHub issue body from BA + Jira template; dispatch developer agent)
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/ai-teammate-agent.ts
        env:
          AI_TEAMMATE_MODE: codex_ba_finish
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          # TEMP: stop workflow_dispatch to developer-agent.yml (same idea as `if: false` on a dispatch step).
          # Re-enable: set to 'false' or remove this line.
          AI_TEAMMATE_SKIP_DEVELOPER_AGENT_DISPATCH: 'true'
          AI_TEAMMATE_SKIP_BA_REASON: ${{ needs.create_github_issue_and_prepare_ba.outputs.skip_reason }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}

      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
