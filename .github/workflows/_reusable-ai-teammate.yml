# Reusable AI Teammate workflow.
# Checks out the calling (consumer) repo for config, SDLCAgents for Node scripts.
#
# Single job: config `params.steps` (pipeline runner) — Jira gates, GitHub issue, optional async BA
# (`ba_codex_async` + `async_call` → consumer `business-analyst.yml` + `_reusable-codex-run.yml`), then
# `start_developer_agent`. Codex does **not** run inline in this workflow.
#
# Resume: early steps detect `caller_config.params.async_child_run_id`, download parent + child artifacts,
# main `pipeline_ci` step reads `caller_config.params.async_child_run_id` + `async_trigger_step` to resume the step loop (skip prior steps, complete async from artifacts, run tail).
#
# Usage in consumer repo:
#   jobs:
#     call:
#       permissions:
#         actions: write   # required — this reusable job uses actions: write (artifacts)
#         contents: write
#         issues: write
#         pull-requests: write
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-ai-teammate.yml@master
#       with:
#         concurrency_key: ${{ inputs.concurrency_key }}
#         config_file: ${{ inputs.config_file }}
#         caller_config: ${{ inputs.caller_config }}
#       secrets: inherit
name: "[Reusable] AI Teammate"

on:
  workflow_call:
    inputs:
      concurrency_key:
        description: "Jira issue key — must match the key inside caller_config (async handoff paths are async-invocation-handoff/<this value>/)."
        required: true
        type: string
      config_file:
        description: "Path to agent JSON in consumer repo (e.g. config/workflows/ai-teammate/ai-teammate.config)"
        required: true
        type: string
      caller_config:
        description: "Caller payload: URL-encoded JSON { params: { inputJql, customParams? } } (ticket + overrides; see buildAiTeammateCallerConfigEncoded in src/lib/routing_helper.ts)."
        required: true
        type: string
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to pull scripts from"
        required: false
        type: string
        default: 'master'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      COPILOT_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  ai_teammate:
    name: AI Teammate (config pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      actions: write
      pull-requests: write
      issues: write
    steps:
      - name: Require workflow_call inputs (concurrency_key, config_file, caller_config)
        env:
          CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          CONFIG_FILE: ${{ inputs.config_file }}
          CALLER_CONFIG: ${{ inputs.caller_config }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "${1:-}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          ck=$(trim "${CONCURRENCY_KEY-}")
          cf=$(trim "${CONFIG_FILE-}")
          cc=$(trim "${CALLER_CONFIG-}")
          err=0
          if [ -z "$ck" ]; then echo "::error::concurrency_key must be non-empty."; err=1; fi
          if [ -z "$cf" ]; then echo "::error::config_file must be non-empty — path to agent JSON in the consumer repo (e.g. config/workflows/ai-teammate/ai-teammate.config). Pass it from workflow_dispatch like Scrum Master does."; err=1; fi
          if [ -z "$cc" ]; then echo "::error::caller_config must be non-empty."; err=1; fi
          exit "$err"

      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Upload input configuration artifact
        uses: DmitryLukyanov/SDLCAgents/.github/actions/upload-workflow-dispatch-inputs-artifact@master
        with:
          concurrency_key: ${{ inputs.concurrency_key }}
          config_file: ${{ inputs.config_file }}
          caller_config: ${{ inputs.caller_config }}
          artifact_name: ai-teammate-${{ inputs.concurrency_key }}-input-configuration
          checkout_repository: 'false'

      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      - name: Check spec-kit prerequisites
        id: speckit_check
        uses: ./.sdlc-agents/.github/actions/check-speckit-prerequisites

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      - name: Run context (resume after async BA vs fresh)
        id: resume_ctx
        env:
          CALLER_CONFIG_RAW: ${{ inputs.caller_config }}
        uses: actions/github-script@v7
        with:
          script: |
            const raw = decodeURIComponent(process.env.CALLER_CONFIG_RAW.trim());
            const j = JSON.parse(raw);
            const child = (j?.params?.async_child_run_id ?? '').toString().trim();
            const parent = (j?.params?.parent_run_id ?? '').toString().trim();
            // Guard: treat unevaluated GHA expression placeholders as absent.
            // When caller_config is assembled at dispatch time the template literal
            // `${{ steps.X.outputs.run_id }}` can leak through as a literal string
            // if the upstream step hasn't produced the output yet. Treating that
            // placeholder as a real run-id would mis-detect a resume and attempt
            // artifact downloads / repeated BA dispatch.
            const isPlaceholder = child.includes('${{');
            const isResume = Boolean(child) && !isPlaceholder;
            if (isResume && !parent) {
              core.setFailed('caller_config.params.parent_run_id is required when async_child_run_id is set (resume after async BA)');
              return;
            }
            core.setOutput('is_resume', isResume ? 'true' : 'false');
            if (isResume) {
              core.setOutput('prepare_run_id', parent);
              core.setOutput('codex_run_id', child);
            }

      - name: Download BA prepare artifact (parent run, resume only)
        if: steps.resume_ctx.outputs.is_resume == 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.COPILOT_PAT }}
          run_id: ${{ steps.resume_ctx.outputs.prepare_run_id }}
          name: caller-handoff_input
          path: async-invocation-handoff/${{ inputs.concurrency_key }}/

      - name: Download BA post-Codex artifact (async child run, resume only)
        if: steps.resume_ctx.outputs.is_resume == 'true'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          github_token: ${{ secrets.COPILOT_PAT }}
          run_id: ${{ steps.resume_ctx.outputs.codex_run_id }}
          name: caller-handoff_codex_output
          path: async-invocation-handoff/${{ inputs.concurrency_key }}/

      - name: AI Teammate — pipeline (config steps or resume finish)
        id: pipeline
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/ai-teammate-agent.ts
        env:
          AI_TEAMMATE_MODE: pipeline_ci
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          CONFIG_FILE: ${{ inputs.config_file }}
          CALLER_CONFIG: ${{ inputs.caller_config }}

      - name: Resolve async handoff directory
        if: steps.pipeline.outputs.needs_async_handoff == 'true' || steps.resume_ctx.outputs.is_resume == 'true'
        id: handoff_dir
        run: |
          set -euo pipefail
          ROOT="async-invocation-handoff/${{ inputs.concurrency_key }}"
          echo "dir=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Verify invocation input artifacts (parent)
        if: steps.pipeline.outputs.needs_async_handoff == 'true'
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/verify-invocation-handoff-ci.ts
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
          CALLER_CONFIG: ${{ inputs.caller_config }}
          AI_TEAMMATE_CONCURRENCY_KEY: ${{ inputs.concurrency_key }}

      - name: Upload BA workspace (for async Codex child)
        if: steps.pipeline.outputs.needs_async_handoff == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: caller-handoff_input
          path: ${{ steps.handoff_dir.outputs.dir }}/
          if-no-files-found: error

      - name: Upload BA checkpoint (ba-codex-state.json)
        if: steps.pipeline.outputs.needs_async_handoff == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-teammate-ba-${{ inputs.concurrency_key }}-ba-codex-state
          path: ${{ steps.handoff_dir.outputs.dir }}/ba-codex-state.json
          if-no-files-found: ignore

      - name: Dispatch async BA child (config async_call)
        if: steps.pipeline.outputs.needs_async_handoff == 'true'
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW_REF="${{ github.workflow_ref }}"
          path_part="${WORKFLOW_REF%%@*}"
          ENTRY_FILE="$(basename "${path_part}")"
          if [ -z "${ENTRY_FILE}" ]; then
            echo "::error::Could not derive callback workflow file from github.workflow_ref (got: ${WORKFLOW_REF})"
            exit 1
          fi
          export CONFIG_FILE="${{ inputs.config_file }}"
          export CALLER_CONFIG="${{ inputs.caller_config }}"
          export COPILOT_PAT="${{ secrets.COPILOT_PAT }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_SERVER_URL="${{ github.server_url }}"
          export GITHUB_RUN_ID="${{ github.run_id }}"
          export GITHUB_REF_NAME="${{ github.ref_name }}"
          export AI_TEAMMATE_CONCURRENCY_KEY="${{ inputs.concurrency_key }}"
          export AI_TEAMMATE_SKIP_BA_REASON=""
          export AI_TEAMMATE_RUN_CODEX="true"
          export AI_TEAMMATE_ENTRY_WORKFLOW_FILE="${ENTRY_FILE}"
          .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/ai-teammate/dispatch-pipeline-async-child-ci.ts

      # Optional dump of async handoff tree (local debug) — not spec-kit step output.
      - name: Upload async handoff tree (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-teammate-${{ inputs.concurrency_key }}-async-handoff
          path: async-invocation-handoff/
          if-no-files-found: ignore
