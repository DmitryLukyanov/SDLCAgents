# Reusable job workflow: checkout consumer repo, optional artifact download,
# optional inline prompt materialization, `openai/codex-action@v1`, optional
# commit+push of workspace changes, then upload artifact(s).
#
# After Codex, two extra single-file artifacts are always uploaded when the prompt was resolved:
#   • codex_input_<upload_artifact_name> — the prompt file passed to codex-action
#   • codex_output_<upload_artifact_name> — Codex output file (skipped if missing, e.g. hard failure before write)
#
# Optional `checkout_ref` + secret `COPILOT_PAT`: checkout a feature branch (e.g. workflow_dispatch
# where GITHUB_REF is not the branch Codex should run on).
#
# Optional `commit_workspace_after_codex`: after a successful Codex run, stage changes with
# `git add -u` + untracked (respecting .gitignore), skip `.sdlc-agents/` except `extra_git_add_paths`,
# never stage `node_modules`, then commit with `workspace_commit_message` and push to `checkout_ref`.
# Used by Developer Agent so teardown only updates state / PR metadata.
#
# Prompt (exactly one — XOR):
#   • prompt_file — non-empty path to an existing file after checkout/download (passed to codex-action).
#   • prompt_content — non-empty inline text; written to `.sdlc-agents/codex-prompt-from-workflow-input.md`
#     before Codex (prompt_file must be empty). Do not set both.
#
# Used by other SDLCAgents reusable workflows (same repo) via:
#   uses: ./.github/workflows/_reusable-codex-run.yml
#
# Paths are relative to the consumer repository root (the checked-out workspace).
name: "[Reusable] Codex run"

on:
  workflow_call:
    inputs:
      download_artifact_name:
        description: "Artifact name to download before Codex (empty = skip download)"
        required: false
        type: string
        default: ''
      download_path:
        description: "Directory for download-artifact extract (ignored when download is skipped). For single-file artifacts, basename lands here — use the same directory as in prompt_file (e.g. .sdlc-agents)."
        required: false
        type: string
        default: '.'
      prompt_file:
        description: "Use existing prompt at this path (relative to workspace). Leave empty when using prompt_content instead. Do not set both prompt_file and prompt_content."
        required: false
        type: string
        default: ''
      prompt_content:
        description: "Inline prompt text; written to a fixed path before Codex. Leave empty when using prompt_file instead. Do not set both."
        required: false
        type: string
        default: ''
      output_file:
        description: "Codex output file path relative to workspace root"
        required: true
        type: string
      upload_artifact_name:
        description: "Artifact name for post-Codex upload"
        required: true
        type: string
      upload_path:
        description: "Path or glob passed to upload-artifact (usually a directory ending with /)"
        required: true
        type: string
      upload_if_no_files_found:
        description: "error | ignore — passed to actions/upload-artifact"
        required: false
        type: string
        default: ignore
      codex_model:
        description: "OpenAI model id (validated at runtime - must be non-empty)"
        required: false
        type: string
        default: ''
      codex_step_name:
        description: "Display name for the Codex step in the Actions UI"
        required: false
        type: string
        default: Run Codex
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 20
      checkout_ref:
        description: "When non-empty, checkout this ref with COPILOT_PAT (omit for default GITHUB_REF checkout). Required when commit_workspace_after_codex is true."
        required: false
        type: string
        default: ''
      commit_workspace_after_codex:
        description: "When true, commit and push consumer changes after Codex (requires checkout_ref + workspace_commit_message)"
        required: false
        type: boolean
        default: false
      workspace_commit_message:
        description: "Commit message when commit_workspace_after_codex is true"
        required: false
        type: string
        default: ''
      git_commit_user_email:
        description: "Author email for workspace_commit step"
        required: false
        type: string
        default: 'speckit-developer-agent@sdlc-agents.bot'
      git_commit_user_name:
        description: "Author name for workspace_commit step"
        required: false
        type: string
        default: 'SDLC SpecKit Developer Agent'
      extra_git_add_paths:
        description: "Optional newline-separated paths to `git add -f` after the main add (e.g. Codex log under .sdlc-agents)"
        required: false
        type: string
        default: ''
    secrets:
      OPENAI_API_KEY:
        required: true
      COPILOT_PAT:
        description: "Required when checkout_ref is set (private repo / non-default ref); used to push after workspace commit"
        required: false

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
    steps:
      - name: Checkout consumer repo
        if: ${{ inputs.checkout_ref == '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout consumer repo (explicit ref)
        if: ${{ inputs.checkout_ref != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}
          token: ${{ secrets.COPILOT_PAT }}

      - name: Download workspace for Codex
        if: ${{ inputs.download_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.download_artifact_name }}
          path: ${{ inputs.download_path }}

      - name: Resolve prompt path (exactly one of prompt_file or prompt_content)
        id: resolve_prompt
        env:
          IN_FILE: ${{ inputs.prompt_file }}
        run: |
          set -euo pipefail
          # Booleans expanded by Actions (true/false) — avoid env coercion quirks.
          HAS_FILE=${{ inputs.prompt_file != '' }}
          HAS_CONTENT=${{ inputs.prompt_content != '' }}
          DEFAULT='.sdlc-agents/codex-prompt-from-workflow-input.md'
          if [ "$HAS_FILE" = "true" ] && [ "$HAS_CONTENT" = "true" ]; then
            echo '::error::Set only one of prompt_file (existing path) or prompt_content (inline text), not both.'
            exit 1
          fi
          if [ "$HAS_FILE" != "true" ] && [ "$HAS_CONTENT" != "true" ]; then
            echo '::error::Provide exactly one of: prompt_file (non-empty path) or prompt_content (non-empty text).'
            exit 1
          fi
          if [ "$HAS_CONTENT" = "true" ]; then
            echo 'prompt_path<<__PROMPT_PATH_EOF__' >> "$GITHUB_OUTPUT"
            printf '%s\n' "$DEFAULT" >> "$GITHUB_OUTPUT"
            echo __PROMPT_PATH_EOF__ >> "$GITHUB_OUTPUT"
            echo 'mode=content' >> "$GITHUB_OUTPUT"
          else
            echo 'prompt_path<<__PROMPT_PATH_EOF__' >> "$GITHUB_OUTPUT"
            printf '%s\n' "$IN_FILE" >> "$GITHUB_OUTPUT"
            echo __PROMPT_PATH_EOF__ >> "$GITHUB_OUTPUT"
            echo 'mode=file' >> "$GITHUB_OUTPUT"
          fi

      - name: Write prompt from prompt_content
        if: steps.resolve_prompt.outputs.mode == 'content'
        env:
          PROMPT_PATH: ${{ steps.resolve_prompt.outputs.prompt_path }}
          PROMPT_CONTENT: ${{ inputs.prompt_content }}
        run: |
          set -euo pipefail
          python3 -c "import os, pathlib; p=pathlib.Path(os.environ['PROMPT_PATH']); p.parent.mkdir(parents=True, exist_ok=True); p.write_text(os.environ['PROMPT_CONTENT'], encoding='utf-8')"
          echo "Wrote inline prompt to $PROMPT_PATH ($(wc -c < "$PROMPT_PATH" | tr -d ' ') bytes)"

      - name: Ensure prompt file exists
        env:
          PROMPT_PATH: ${{ steps.resolve_prompt.outputs.prompt_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$PROMPT_PATH" ]; then
            echo "::error::Prompt file missing: $PROMPT_PATH"
            exit 1
          fi

      - name: Pick Codex model
        id: pick_model
        run: |
          M="${{ inputs.codex_model }}"
          if [ -z "$M" ]; then
            echo "::error::codex_model input is required. Configure it in your workflow or agent config."
            exit 1
          fi
          echo "codex_model=$M" >> "$GITHUB_OUTPUT"

      - name: Log model to GitHub Summary
        run: |
          {
            echo "## Codex Configuration"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| **Model** | \`${{ steps.pick_model.outputs.codex_model }}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ${{ inputs.codex_step_name }}
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.resolve_prompt.outputs.prompt_path }}
          sandbox: workspace-write
          model: ${{ steps.pick_model.outputs.codex_model }}
          output-file: ${{ inputs.output_file }}
          allow-bots: true

      - name: Upload Codex input prompt artifact
        if: always() && steps.resolve_prompt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: codex_input_${{ inputs.upload_artifact_name }}
          path: ${{ steps.resolve_prompt.outputs.prompt_path }}
          if-no-files-found: error

      - name: Upload Codex output artifact
        if: always() && steps.resolve_prompt.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: codex_output_${{ inputs.upload_artifact_name }}
          path: ${{ inputs.output_file }}
          if-no-files-found: ignore

      - name: Commit and push workspace changes after Codex
        if: success() && inputs.commit_workspace_after_codex == true
        env:
          COMMIT_MSG: ${{ inputs.workspace_commit_message }}
          GIT_USER_EMAIL: ${{ inputs.git_commit_user_email }}
          GIT_USER_NAME: ${{ inputs.git_commit_user_name }}
          BRANCH: ${{ inputs.checkout_ref }}
          EXTRA_PATHS: ${{ inputs.extra_git_add_paths }}
          CODEX_OUTPUT_FILE: ${{ inputs.output_file }}
        run: |
          set -euo pipefail
          if [ -z "${COMMIT_MSG// }" ]; then
            echo '::error::workspace_commit_message is required when commit_workspace_after_codex is true'
            exit 1
          fi
          if [ -z "${BRANCH// }" ]; then
            echo '::error::checkout_ref must be set when commit_workspace_after_codex is true'
            exit 1
          fi
          git config user.email "$GIT_USER_EMAIL"
          git config user.name "$GIT_USER_NAME"
          # Do not use `git add -A` + pathspec excludes: nested `**/node_modules` is easy to miss and
          # Git then tries to stage ignored trees and aborts ("ignored by .gitignore").
          git add -u
          while IFS= read -r -d '' f; do
            case "$f" in
              .sdlc-agents/*|.sdlc-agents) continue ;;
            esac
            git add -- "$f"
          done < <(git ls-files -z --others --exclude-standard)
          git diff --cached --name-only -z \
            | { grep -zE '(^|/)node_modules(/|$)' || true; } \
            | while IFS= read -r -d '' p; do
              [ -z "$p" ] && continue
              git restore --staged -- "$p" || true
            done
          if [ -n "${EXTRA_PATHS:-}" ]; then
            printf '%s\n' "$EXTRA_PATHS" | while IFS= read -r line || [ -n "$line" ]; do
              [ -z "${line// }" ] && continue
              if [ -f "$line" ]; then git add -f "$line"; fi
            done
          fi
          if git diff --cached --quiet; then
            echo "No Codex workspace changes to commit"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:refs/heads/$BRANCH"
          SHA="$(git rev-parse HEAD)"

          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          {
            echo "## Workspace commit (Codex)"
            echo ""
            echo "Created commit [\`${SHA:0:7}\`](${REPO_URL}/commit/${SHA}) on \`${BRANCH}\`."
            echo ""
            echo "### Files in this commit"
            echo ""
            echo "| File | Size |"
            echo "|------|------|"
          } >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            if [ -f "$p" ]; then
              sz=$(wc -c < "$p" | tr -d ' ')
              echo "| \`$p\` | ${sz} B |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$p\` | — |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < <(git show --pretty="" --name-only HEAD)
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${CODEX_OUTPUT_FILE:-}" ] && [ -f "$CODEX_OUTPUT_FILE" ]; then
            {
              echo "<details><summary>Codex CLI output</summary>"
              echo ""
              echo '```'
              cat "$CODEX_OUTPUT_FILE"
              echo '```'
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Codex workspace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.upload_artifact_name }}
          path: ${{ inputs.upload_path }}
          if-no-files-found: ${{ inputs.upload_if_no_files_found }}
