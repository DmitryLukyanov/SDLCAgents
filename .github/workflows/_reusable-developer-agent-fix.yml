# Reusable Developer Agent — Fix handler.
#
# Three jobs:
#   1. prepare — PR branch, state, fix-setup.ts → `.sdlc-agents/codex-fix-prompt.md`, upload prompt artifact
#   2. codex — `./_reusable-codex-run.yml` (feature-branch checkout + Codex + commit/push fix changes)
#   3. teardown — developer-agent-fix-teardown.ts — speckit-state touch, push, PR comment
#
# Makes TARGETED edits to existing spec-kit artifacts to address the specific
# issues reported by the spec gate. Does NOT re-run the full speckit step.
#
# Triggered by: developer-agent-fix.yml (consumer) on /fix PR comments
name: "[Reusable] Developer Agent — Fix"

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number where /fix was commented"
        required: true
        type: number
      fix_comment_body:
        description: "Full comment body starting with /fix — prefix is stripped here"
        required: true
        type: string
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to use"
        required: false
        type: string
        default: 'master'
    secrets:
      COPILOT_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      branch_name: ${{ steps.state.outputs.branch_name }}
      issue_key: ${{ steps.state.outputs.issue_key }}
      pr_number: ${{ steps.state.outputs.pr_number }}
      codex_model: ${{ steps.fix_setup.outputs.codex_model }}
      fix_instructions: ${{ steps.fix.outputs.fix_instructions }}
    steps:
      - name: Extract fix instructions
        id: fix
        env:
          COMMENT_BODY: ${{ inputs.fix_comment_body }}
        run: |
          INSTRUCTIONS=$(printf '%s' "$COMMENT_BODY" | sed 's|^/fix[[:space:]]*||')
          echo "fix_instructions<<EOF_FIX" >> "$GITHUB_OUTPUT"
          printf '%s' "$INSTRUCTIONS" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "EOF_FIX" >> "$GITHUB_OUTPUT"
          echo "Extracted fix instructions (${#INSTRUCTIONS} chars)"

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
            });
            core.setOutput('branch', pr.head.ref);
            console.log(`PR #${{ inputs.pr_number }} branch: ${pr.head.ref}`);

      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ secrets.COPILOT_PAT }}
          fetch-depth: 0

      - name: Read speckit state
        id: state
        run: |
          STATE_FILE=$(find . -name 'speckit-state.json' \
            -not -path './.git/*' \
            | head -1)

          if [ -z "$STATE_FILE" ]; then
            echo "::error::No speckit-state.json found on branch ${{ steps.pr.outputs.branch }}"
            exit 1
          fi

          python3 - "$STATE_FILE" << 'PYEOF'
          import json, sys, os
          s = json.load(open(sys.argv[1]))
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"issue_key={s.get('issueKey', '')}\n")
              f.write(f"pr_number={s.get('prNumber', '')}\n")
              f.write(f"branch_name={s.get('branchName', '')}\n")
          print(f"issue={s.get('issueKey')} pr=#{s.get('prNumber')} branch={s.get('branchName')}")
          PYEOF

      - name: Checkout SDLCAgents
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      - name: Configure git
        run: |
          git config user.email "developer-agent@sdlc-agents.bot"
          git config user.name "SDLC Developer Agent"

      - name: Run fix agent — setup
        id: fix_setup
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/developer-agent/developer-agent-fix-setup.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_KEY: ${{ steps.state.outputs.issue_key }}
          FIX_INSTRUCTIONS: ${{ steps.fix.outputs.fix_instructions }}
          DEVELOPER_AGENT_MODEL: ${{ vars.DEVELOPER_AGENT_MODEL }}

      - name: Print Codex fix prompt
        run: |
          cat .sdlc-agents/.github/content/job-summary-codex-fix-header.md >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '```text' >> "$GITHUB_STEP_SUMMARY"
          cat .sdlc-agents/codex-fix-prompt.md >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Codex fix prompt for Codex job
        uses: actions/upload-artifact@v4
        with:
          name: developer-agent-fix-codex-input-${{ steps.state.outputs.issue_key }}-${{ github.run_id }}
          path: .sdlc-agents/codex-fix-prompt.md
          if-no-files-found: error

  codex:
    needs: prepare
    uses: ./.github/workflows/_reusable-codex-run.yml
    secrets: inherit
    with:
      checkout_ref: ${{ needs.prepare.outputs.branch_name }}
      download_artifact_name: developer-agent-fix-codex-input-${{ needs.prepare.outputs.issue_key }}-${{ github.run_id }}
      download_path: .
      prompt_file: .sdlc-agents/codex-fix-prompt.md
      output_file: .sdlc-agents/codex-fix-output.txt
      upload_artifact_name: developer-agent-fix-codex-output-${{ needs.prepare.outputs.issue_key }}-${{ github.run_id }}
      upload_path: |
        .sdlc-agents/codex-fix-output.txt
        .sdlc-agents/codex-fix-prompt.md
      upload_if_no_files_found: ignore
      codex_model: ${{ needs.prepare.outputs.codex_model }}
      codex_step_name: Apply fix via Codex
      timeout_minutes: 15
      commit_workspace_after_codex: true
      workspace_commit_message: "${{ format('speckit(fix): apply targeted fixes for {0}', needs.prepare.outputs.issue_key) }}"
      extra_git_add_paths: .sdlc-agents/codex-fix-output.txt

  teardown:
    needs: [prepare, codex]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}
          token: ${{ secrets.COPILOT_PAT }}
          fetch-depth: 0

      # Use `sdla` (not `.sdlc-agents`) so the runner clone does not replace consumer `.sdlc-agents/`
      # where `/fix` commits `codex-fix-output.txt` for the job summary.
      - name: Checkout SDLCAgents
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: sdla
          token: ${{ secrets.COPILOT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdla/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: sdla

      - name: Configure git
        run: |
          git config user.email "developer-agent@sdlc-agents.bot"
          git config user.name "SDLC Developer Agent"

      - name: Run fix agent — teardown
        run: sdla/node_modules/.bin/tsx sdla/src/workflows/developer-agent/developer-agent-fix-teardown.ts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_KEY: ${{ needs.prepare.outputs.issue_key }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          FIX_INSTRUCTIONS: ${{ needs.prepare.outputs.fix_instructions }}
