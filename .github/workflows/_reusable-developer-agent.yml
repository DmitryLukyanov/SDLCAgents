# Reusable Developer Agent workflow.
#
# Three jobs:
#   1. prepare — checkout branch, SDLCAgents, developer-agent-setup.ts → `.sdlc-agents/codex-prompt.md`, upload prompt artifact
#   2. codex — `./_reusable-codex-run.yml` (feature-branch checkout + Codex + commit/push artifact changes)
#   3. teardown — developer-agent-teardown.ts — speckit-state.json, push, mark PR ready, PR comment
#
# Flow per invocation:
#   1. Checkout consumer repo on the feature branch
#   2. [specify only] Create branch + draft PR via developer-agent-setup.ts
#   3. Write "$speckit-{step} {input}" prompt to .sdlc-agents/codex-prompt.md
#   4. Reusable Codex job runs the skill and commits workspace changes to the branch
#   5. developer-agent-teardown.ts — update speckit-state.json / push, mark PR ready (implement/code_review),
#      job summary, PR comment (GITHUB_TOKEN GraphQL mark-ready + comments; PAT fallback + git via checkout)
#
# Triggered by AI Teammate (step=specify) or the proceed workflow (subsequent steps).
#
# Required secrets:
#   COPILOT_PAT     — PAT for checkout, setup (GITHUB_TOKEN is overridden with PAT on the setup step only), and git push identity in the runner.
#   OPENAI_API_KEY  — OpenAI key (passed through to `_reusable-codex-run.yml`)
#
# Teardown uses GITHUB_TOKEN for GraphQL markPullRequestReadyForReview + issues.createComment.
# If the PR stays draft (token limits), teardown retries with COPILOT_PAT when present.
#
# Optional repo/org variables (all have sensible defaults):
#   DEVELOPER_AGENT_MODEL            — Codex model for every spec-kit step (default: o4-mini)
#
# Consumer usage: see .github/consumer-templates/developer-agent.yml
name: "[Reusable] Developer Agent"

on:
  workflow_call:
    inputs:
      issue_number:
        description: "GitHub issue number"
        required: true
        type: string
      issue_key:
        description: "Jira issue key (e.g. PROJ-1)"
        required: true
        type: string
      step:
        description: "Spec-kit step to run (specify | clarify | plan | tasks | implement | code_review)"
        required: true
        type: string
      branch_name:
        description: "Feature branch name — required for all steps except specify (read from speckit-state.json by the proceed workflow)"
        required: false
        type: string
        default: ''
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to use"
        required: false
        type: string
        default: 'master'
    secrets:
      COPILOT_PAT:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      branch_name: ${{ steps.agent_setup.outputs.branch_name }}
      pr_number: ${{ steps.agent_setup.outputs.pr_number }}
      feature_dir: ${{ steps.agent_setup.outputs.feature_dir }}
      codex_model: ${{ steps.agent_setup.outputs.codex_model }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_PAT }}

      - name: Switch to feature branch
        if: inputs.branch_name != ''
        env:
          BRANCH: ${{ inputs.branch_name }}
        run: |
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      - name: Checkout SDLCAgents
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      - name: Configure git
        run: |
          git config user.email "developer-agent@sdlc-agents.bot"
          git config user.name "SDLC Developer Agent"

      - name: Run developer agent — setup
        id: agent_setup
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/developer-agent/developer-agent-setup.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_KEY: ${{ inputs.issue_key }}
          STEP: ${{ inputs.step }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          DEVELOPER_AGENT_MODEL: ${{ vars.DEVELOPER_AGENT_MODEL }}

      - name: Print Codex prompt
        run: |
          cat .sdlc-agents/.github/content/job-summary-codex-prompt-header.md >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '```text' >> "$GITHUB_STEP_SUMMARY"
          cat .sdlc-agents/codex-prompt.md >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Codex prompt for Codex job
        uses: actions/upload-artifact@v4
        with:
          name: developer-agent-codex-input-${{ inputs.issue_key }}-${{ inputs.step }}-${{ github.run_id }}
          path: .sdlc-agents/codex-prompt.md
          if-no-files-found: error

  codex:
    needs: prepare
    uses: ./.github/workflows/_reusable-codex-run.yml
    secrets: inherit
    with:
      checkout_ref: ${{ needs.prepare.outputs.branch_name }}
      download_artifact_name: developer-agent-codex-input-${{ inputs.issue_key }}-${{ inputs.step }}-${{ github.run_id }}
      # Single-file artifacts flatten to basename on download; extract into .sdlc-agents so paths match prompt_file.
      download_path: .sdlc-agents
      prompt_file: .sdlc-agents/codex-prompt.md
      output_file: .sdlc-agents/codex-output.txt
      upload_artifact_name: developer-agent-codex-output-${{ inputs.issue_key }}-${{ inputs.step }}-${{ github.run_id }}
      upload_path: |
        .sdlc-agents/codex-output.txt
        .sdlc-agents/codex-prompt.md
      upload_if_no_files_found: ignore
      codex_model: ${{ needs.prepare.outputs.codex_model }}
      codex_step_name: Run Codex skill — ${{ inputs.step }}
      timeout_minutes: 30
      commit_workspace_after_codex: true
      workspace_commit_message: "${{ format('speckit({0}): add {0} artifacts for {1}', inputs.step, inputs.issue_key) }}"

  teardown:
    needs: [prepare, codex]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch_name }}
          token: ${{ secrets.COPILOT_PAT }}

      # Use a path other than `.sdlc-agents` so we do not overwrite consumer-tracked files under
      # `.sdlc-agents/` (e.g. fix flow commits `codex-fix-output.txt` there for the summary).
      - name: Checkout SDLCAgents
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: sdla
          token: ${{ secrets.COPILOT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdla/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: sdla

      - name: Configure git
        run: |
          git config user.email "developer-agent@sdlc-agents.bot"
          git config user.name "SDLC Developer Agent"

      - name: Run developer agent — teardown
        run: sdla/node_modules/.bin/tsx sdla/src/workflows/developer-agent/developer-agent-teardown.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_KEY: ${{ inputs.issue_key }}
          STEP: ${{ inputs.step }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          FEATURE_DIR: ${{ needs.prepare.outputs.feature_dir }}
