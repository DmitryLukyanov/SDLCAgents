# Reusable onboarding workflow.
#
# Sources:
#   - Workflow files       → SDLCAgents .github/consumer-templates/
#   - Agents, prompts, configs → reference consumer repo (SDLCClient)
#
# Called by the consumer's onboarding.yml — do NOT modify this file in
# the consumer repo; update it here in SDLCAgents instead.
name: _reusable-onboarding

on:
  workflow_call:
    inputs:
      jira_project_key:
        description: "Jira project key used in JQL queries (e.g. MYPROJ). Update to match your project — defaults to the reference project SDLCSPAC."
        required: false
        default: "SDLCSPAC"
        type: string
      reference_repo:
        description: "Reference consumer repo to copy agents, prompts and configs from"
        required: false
        default: "DmitryLukyanov/SDLCClient"
        type: string
      reference_ref:
        description: "Branch or tag of the reference repo"
        required: false
        default: "master"
        type: string
      agents_repo:
        description: "SDLCAgents repo to copy workflow templates from"
        required: false
        default: "DmitryLukyanov/SDLCAgents"
        type: string
      agents_ref:
        description: "Branch or tag of the SDLCAgents repo"
        required: false
        default: "master"
        type: string

jobs:
  onboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COPILOT_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run spec-kit init
        run: |
          # Remove existing spec-kit managed dirs so _install_shared_infra always
          # copies fresh files and records them in speckit.manifest.json.
          # Without this, on re-runs all files are "skipped" (already exist) and
          # the manifest is saved as {"files": {}}.
          rm -rf .specify/scripts .specify/templates
          uvx --from git+https://github.com/github/spec-kit.git@v0.5.0 \
            specify init --here --ai copilot --script ps --force
          echo "✅ spec-kit initialised"

      - name: Sparse-checkout SDLCAgents (workflow templates, agents, prompts, scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.agents_repo }}
          ref: ${{ inputs.agents_ref }}
          token: ${{ secrets.COPILOT_PAT }}
          path: _sdlc_agents
          sparse-checkout: |
            .github/consumer-templates
            .github/agents
            .github/prompts
            .specify/scripts

      - name: Sparse-checkout reference consumer repo (configs)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.reference_repo }}
          ref: ${{ inputs.reference_ref }}
          token: ${{ secrets.COPILOT_PAT }}
          path: _sdlc_reference
          sparse-checkout: |
            .github/copilot-instructions.md
            config/spec-kit
            config/workflows

      - name: Copy files into consumer repo
        run: |
          PROJ="${{ inputs.jira_project_key }}"

          # ── Workflows from SDLCAgents consumer-templates ───────────
          mkdir -p .github/workflows
          for f in _sdlc_agents/.github/consumer-templates/*.yml; do
            fname=$(basename "$f")
            case "$fname" in
              onboarding.yml) continue ;;  # skip — already present
            esac
            cp "$f" ".github/workflows/$fname"
            echo "  copied workflow: $fname"
          done

          # ── .specify/scripts (from SDLCAgents — overrides spec-kit defaults) ──
          mkdir -p .specify/scripts
          cp -r _sdlc_agents/.specify/scripts/. .specify/scripts/
          echo "  copied .specify/scripts/"

          # ── .github/agents (from SDLCAgents — source of truth) ───────
          mkdir -p .github/agents
          cp -r _sdlc_agents/.github/agents/. .github/agents/

          # ── .github/prompts (from SDLCAgents — source of truth) ───────
          mkdir -p .github/prompts
          cp -r _sdlc_agents/.github/prompts/. .github/prompts/

          # ── Re-hash manifests after SDLCAgents overrides ──────────────
          # spec-kit recorded hashes for its generated files; now that we've
          # overwritten .specify/scripts/, .github/agents/, and
          # .github/prompts/ with our own files, update both manifests so
          # hashes match what's on disk — otherwise `specify integration
          # uninstall` would see mismatches and silently skip those files.
          python3 - <<'PYEOF'
          import json, hashlib
          from pathlib import Path

          for key in ('speckit', 'copilot'):
              mp = Path('.specify/integrations/' + key + '.manifest.json')
              if not mp.exists():
                  continue
              manifest = json.loads(mp.read_text())
              files = {}
              for rel_path in manifest.get('files', {}):
                  p = Path(rel_path)
                  if p.exists():
                      files[rel_path] = hashlib.sha256(p.read_bytes()).hexdigest()
              manifest['files'] = files
              mp.write_text(json.dumps(manifest, indent=2) + '\n')
              print('  updated ' + key + '.manifest.json (' + str(len(files)) + ' files re-hashed)')
          PYEOF

          # ── copilot-instructions.md ───────────────────────────────
          cp _sdlc_reference/.github/copilot-instructions.md .github/copilot-instructions.md

          # .specify is handled by spec-kit init above — skip reference copy

          # ── config/spec-kit ───────────────────────────────────────
          mkdir -p config/spec-kit
          cp _sdlc_reference/config/spec-kit/defaults.json config/spec-kit/defaults.json
          cp _sdlc_reference/config/spec-kit/constitution.md config/spec-kit/constitution.md

          # ── config/workflows ──────────────────────────────────────
          for dir in ai-teammate scrum-master; do
            mkdir -p "config/workflows/$dir"
            src="_sdlc_reference/config/workflows/$dir"
            if [ -d "$src" ]; then
              cp -r "$src/." "config/workflows/$dir/"
              echo "  copied config/workflows/$dir/"
            fi
          done

          # ── Replace Jira project key in all configs ────────────────
          echo "  replacing SDLCSPAC → $PROJ in configs..."
          find config/workflows -name "*.config" -exec sed -i "s/SDLCSPAC/$PROJ/g" {} \;

          # ── Cleanup checkouts ──────────────────────────────────────
          rm -rf _sdlc_agents _sdlc_reference

          echo ""
          echo "✅ Onboarding complete for project: $PROJ"

      - name: Verify spec-kit configuration
        run: |
          echo "=== Spec-Kit Configuration Status ==="
          ok=true

          check_file() {
            local label="$1" path="$2"
            if [ -f "$path" ]; then
              echo "  ✅ $label"
            else
              echo "  ❌ $label  ($path)"
              ok=false
            fi
          }

          check_dir() {
            local label="$1" path="$2"
            if [ -d "$path" ]; then
              echo "  ✅ $label"
            else
              echo "  ❌ $label  ($path)"
              ok=false
            fi
          }

          echo ""
          echo "── spec-kit init ─────────────────────────────"
          check_file "init-options.json"                .specify/init-options.json
          check_file "create-new-feature.ps1 (SDLCAgents)" .specify/scripts/powershell/create-new-feature.ps1
          check_file "check-prerequisites.ps1"           .specify/scripts/powershell/check-prerequisites.ps1
          check_file "common.ps1"                        .specify/scripts/powershell/common.ps1
          check_file "spec-template.md"                 .specify/templates/spec-template.md
          check_file "copilot manifest"                 .specify/integrations/copilot.manifest.json

          echo ""
          echo "── GitHub workflows ──────────────────────────"
          check_file "ai-teammate.yml"                  .github/workflows/ai-teammate.yml
          check_file "scrum-master.yml"                 .github/workflows/scrum-master.yml
          check_file "copilot-setup-steps.yml"          .github/workflows/copilot-setup-steps.yml
          check_file "pr-merged.yml"                    .github/workflows/pr-merged.yml

          echo ""
          echo "── Agents ────────────────────────────────────"
          check_dir  ".github/agents/"                  .github/agents
          check_file "speckit.specify.agent.md"         .github/agents/speckit.specify.agent.md
          check_file "speckit.clarify.agent.md"         .github/agents/speckit.clarify.agent.md
          check_file "speckit.plan.agent.md"            .github/agents/speckit.plan.agent.md
          check_file "speckit.tasks.agent.md"           .github/agents/speckit.tasks.agent.md
          check_file "speckit.implement.agent.md"       .github/agents/speckit.implement.agent.md
          check_file "speckit.step-controller.agent.md" .github/agents/speckit.step-controller.agent.md

          echo ""
          echo "── Config ────────────────────────────────────"
          check_file "defaults.json"                    config/spec-kit/defaults.json
          check_file "constitution.md"                  config/spec-kit/constitution.md
          check_file "ai-teammate.config"               config/workflows/ai-teammate/ai-teammate.config
          check_file "scrum-master.config"              config/workflows/scrum-master/scrum-master.config

          echo ""
          if [ "$ok" = true ]; then
            echo "✅ All checks passed — spec-kit is ready."
          else
            echo "❌ Some files are missing — review the errors above."
            exit 1
          fi

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — all files already up to date."
            exit 0
          fi

          BRANCH="onboarding/${{ inputs.jira_project_key }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: onboard SDLC pipeline files (project: ${{ inputs.jira_project_key }})"
          git push origin "$BRANCH" --force

          # Create or reopen PR
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state closed --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ] && gh pr reopen "$EXISTING_PR"; then
            echo "Reopened PR #$EXISTING_PR for branch: $BRANCH"
          else
            gh pr create \
              --title "chore: onboard SDLC pipeline (project: ${{ inputs.jira_project_key }})" \
              --body "$(cat <<'EOF'
          ## SDLC Pipeline Onboarding

          This PR was created automatically by the onboarding workflow.

          ### What's included
          - .specify/ - spec-kit scripts, templates, and integrations
          - .github/workflows/ - ai-teammate, scrum-master, copilot-setup-steps, pr-merged
          - .github/agents/ - spec-kit and pipeline agent files
          - .github/prompts/ - spec-kit prompt files
          - .github/copilot-instructions.md
          - config/spec-kit/ - defaults and constitution
          - config/workflows/ - ai-teammate and scrum-master configs

          ### Next steps
          1. Review the config files under config/workflows/ for your project settings
          2. Ensure the COPILOT_PAT secret is set in this repo
          3. Merge this PR to activate the pipeline
          EOF
          )" \
              --base master \
              --head "$BRANCH"
            echo "PR created for branch: $BRANCH"
          fi

      - name: Run spec-kit check
        run: |
          uvx --from git+https://github.com/github/spec-kit.git@v0.5.0 \
            specify check
