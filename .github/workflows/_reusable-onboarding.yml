# Reusable onboarding workflow.
#
# File sources:
#   spec-kit (via `specify init --ai codex --ai-skills`):
#     - .specify/scripts/, .specify/templates/, .specify/integrations/
#     - .agents/skills/speckit-{step}/SKILL.md  (native Codex skills for CI)
#
#   SDLCAgents (single source of truth, overrides spec-kit defaults):
#     - .github/workflows/    ← consumer-templates/
#     - .github/agents/       ← .github/agents/
#     - .github/prompts/      ← .github/prompts/
#     - .github/copilot-instructions.md
#     - .specify/scripts/     ← .specify/scripts/
#     - .cursor/skills/       ← repo stores skills here; copied to consumer .agents/skills/ only
#     - config/spec-kit/      ← config/spec-kit/
#     - config/workflows/     ← config/workflows/
#
# Called by the consumer's onboarding.yml — do NOT modify this file in
# the consumer repo; update it here in SDLCAgents instead.
name: _reusable-onboarding

on:
  workflow_call:
    inputs:
      jira_project_key:
        description: "Jira project key used in JQL queries (e.g. MYPROJ). Update to match your project — defaults to the reference project SDLCSPAC."
        required: false
        default: "SDLCSPAC"
        type: string
      agents_repo:
        description: "SDLCAgents repo (source of truth for all onboarding files)"
        required: false
        default: "DmitryLukyanov/SDLCAgents"
        type: string
      agents_ref:
        description: "Branch or tag of the SDLCAgents repo"
        required: false
        default: "master"
        type: string

jobs:
  onboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COPILOT_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false   # uv is used only as a one-shot uvx runner; no uv.lock exists

      - name: Run spec-kit init
        run: |
          # Remove existing spec-kit managed dirs so _install_shared_infra always
          # copies fresh files and records them in speckit.manifest.json.
          # Without this, on re-runs all files are "skipped" (already exist) and
          # the manifest is saved as {"files": {}}.
          rm -rf .specify/scripts .specify/templates .agents/skills
          uvx --from git+https://github.com/github/spec-kit.git@v0.8.6 \
            specify init --here --ai codex --ai-skills \
            --script sh --force --ignore-agent-tools
          echo "✅ spec-kit initialised"
          echo "   Codex skills generated:"
          find .agents/skills -name 'SKILL.md' 2>/dev/null | sort | sed 's/^/    /' || true

      - name: Sparse-checkout SDLCAgents (workflow templates, agents, prompts, scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.agents_repo }}
          ref: ${{ inputs.agents_ref }}
          token: ${{ secrets.COPILOT_PAT }}
          path: _sdlc_agents
          sparse-checkout: |
            .github/consumer-templates
            .github/content
            .github/agents
            .github/prompts
            .github/copilot-instructions.md
            .specify/scripts
            .cursor/skills
            config/spec-kit
            config/workflows

      - name: Copy files into consumer repo
        run: |
          PROJ="${{ inputs.jira_project_key }}"

          # ── Workflows from SDLCAgents consumer-templates ───────────
          mkdir -p .github/workflows
          for f in _sdlc_agents/.github/consumer-templates/*.yml; do
            fname=$(basename "$f")
            case "$fname" in
              onboarding.yml) continue ;;  # skip — already present
            esac
            cp "$f" ".github/workflows/$fname"
            echo "  copied workflow: $fname"
          done

          # ── .specify/scripts (from SDLCAgents — overrides spec-kit defaults) ──
          mkdir -p .specify/scripts
          cp -r _sdlc_agents/.specify/scripts/. .specify/scripts/
          echo "  copied .specify/scripts/"

          # ── .agents/skills (SDLCAgents stores skills under `.cursor/skills/` on disk) ──
          mkdir -p .agents/skills
          cp -r _sdlc_agents/.cursor/skills/. .agents/skills/
          echo "  copied SDLCAgents .cursor/skills → .agents/skills/ (Codex)"

          # ── .github/content (PR bodies, job-summary snippets) ───────
          mkdir -p .github/content
          cp _sdlc_agents/.github/content/*.md .github/content/
          echo "  copied .github/content/*.md"

          # ── .github/agents (from SDLCAgents — source of truth) ───────
          mkdir -p .github/agents
          cp -r _sdlc_agents/.github/agents/. .github/agents/

          # ── .github/prompts (from SDLCAgents — source of truth) ───────
          mkdir -p .github/prompts
          cp -r _sdlc_agents/.github/prompts/. .github/prompts/

          # ── Re-hash manifests after SDLCAgents overrides ──────────────
          # spec-kit recorded hashes for its generated files; now that we've
          # overwritten .specify/scripts/, .agents/skills/, .github/agents/, and
          # .github/prompts/ with our own files, update both manifests so
          # hashes match what's on disk — otherwise `specify integration
          # uninstall` would see mismatches and silently skip those files.
          python3 - <<'PYEOF'
          import json, hashlib
          from pathlib import Path

          for key in ('speckit', 'codex'):
              mp = Path('.specify/integrations/' + key + '.manifest.json')
              if not mp.exists():
                  continue
              manifest = json.loads(mp.read_text())
              files = {}
              for rel_path in manifest.get('files', {}):
                  p = Path(rel_path)
                  if p.exists():
                      files[rel_path] = hashlib.sha256(p.read_bytes()).hexdigest()
              manifest['files'] = files
              mp.write_text(json.dumps(manifest, indent=2) + '\n')
              print('  updated ' + key + '.manifest.json (' + str(len(files)) + ' files re-hashed)')
          PYEOF

          # ── copilot-instructions.md ───────────────────────────────
          cp _sdlc_agents/.github/copilot-instructions.md .github/copilot-instructions.md
          echo "  copied copilot-instructions.md"

          # ── config/spec-kit ───────────────────────────────────────
          mkdir -p config/spec-kit
          cp -r _sdlc_agents/config/spec-kit/. config/spec-kit/
          echo "  copied config/spec-kit/"

          # ── config/workflows ──────────────────────────────────────
          mkdir -p config/workflows
          cp -r _sdlc_agents/config/workflows/. config/workflows/
          echo "  copied config/workflows/"

          # ── Replace Jira project key in all configs ────────────────
          echo "  replacing SDLCSPAC → $PROJ in configs..."
          find config/workflows -name "*.config" -exec sed -i "s/SDLCSPAC/$PROJ/g" {} \;

          # ── Cleanup checkouts ──────────────────────────────────────
          rm -rf _sdlc_agents

          echo ""
          echo "✅ Onboarding complete for project: $PROJ"

      - name: Verify spec-kit configuration
        run: |
          echo "=== Spec-Kit Configuration Status ==="
          ok=true

          check_file() {
            local label="$1" path="$2"
            if [ -f "$path" ]; then
              echo "  ✅ $label"
            else
              echo "  ❌ $label  ($path)"
              ok=false
            fi
          }

          check_dir() {
            local label="$1" path="$2"
            if [ -d "$path" ]; then
              echo "  ✅ $label"
            else
              echo "  ❌ $label  ($path)"
              ok=false
            fi
          }

          echo ""
          echo "── spec-kit init ─────────────────────────────"
          check_file "init-options.json"                .specify/init-options.json
          check_file "create-new-feature.sh (bash)"    .specify/scripts/bash/create-new-feature.sh
          check_file "check-prerequisites.sh"          .specify/scripts/bash/check-prerequisites.sh
          check_file "common.sh"                       .specify/scripts/bash/common.sh
          check_file "spec-template.md"                .specify/templates/spec-template.md
          check_file "codex manifest"                  .specify/integrations/codex.manifest.json

          echo ""
          echo "── GitHub workflows ──────────────────────────"
          check_file "ai-teammate.yml"                  .github/workflows/ai-teammate.yml
          check_file "scrum-master.yml"                 .github/workflows/scrum-master.yml
          check_file "copilot-setup-steps.yml"          .github/workflows/copilot-setup-steps.yml
          check_file "pr-merged.yml"                    .github/workflows/pr-merged.yml
          check_file "spec-gate.yml"                    .github/workflows/spec-gate.yml

          echo ""
          echo "── GitHub content (markdown) ─────────────────"
          check_file "onboarding-pr-body.md"            .github/content/onboarding-pr-body.md

          echo ""
          echo "── Agents ────────────────────────────────────"
          check_dir  ".github/agents/"                  .github/agents
          check_file "sdlc.pipeline.agent.md"           .github/agents/sdlc.pipeline.agent.md
          check_file "code.review.agent.md"             .github/agents/code.review.agent.md

          echo ""
          echo "── Codex skills (native pipeline execution) ──"
          check_dir  ".agents/skills/"                        .agents/skills
          check_file "speckit-specify       SKILL.md"         .agents/skills/speckit-specify/SKILL.md
          check_file "speckit-clarify       SKILL.md"         .agents/skills/speckit-clarify/SKILL.md
          check_file "speckit-plan          SKILL.md"         .agents/skills/speckit-plan/SKILL.md
          check_file "speckit-tasks         SKILL.md"         .agents/skills/speckit-tasks/SKILL.md
          check_file "speckit-implement     SKILL.md"         .agents/skills/speckit-implement/SKILL.md
          check_file "speckit-analyze       SKILL.md"         .agents/skills/speckit-analyze/SKILL.md
          check_file "speckit-checklist     SKILL.md"         .agents/skills/speckit-checklist/SKILL.md
          check_file "speckit-constitution  SKILL.md"         .agents/skills/speckit-constitution/SKILL.md
          check_file "speckit-taskstoissues SKILL.md"         .agents/skills/speckit-taskstoissues/SKILL.md

          echo ""
          echo "── Config ────────────────────────────────────"
          check_file "defaults.json"                    config/spec-kit/defaults.json
          check_file "constitution.md"                  config/spec-kit/constitution.md
          check_file "ai-teammate.config"               config/workflows/ai-teammate/ai-teammate.config
          check_file "scrum-master.config"              config/workflows/scrum-master/scrum-master.config

          echo ""
          if [ "$ok" = true ]; then
            echo "✅ All checks passed — spec-kit is ready."
          else
            echo "❌ Some files are missing — review the errors above."
            exit 1
          fi

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — all files already up to date."
            exit 0
          fi

          BRANCH="onboarding/${{ inputs.jira_project_key }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: onboard SDLC pipeline files (project: ${{ inputs.jira_project_key }})"
          git push origin "$BRANCH" --force

          # Create or reopen PR
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state closed --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ] && gh pr reopen "$EXISTING_PR"; then
            echo "Reopened PR #$EXISTING_PR for branch: $BRANCH"
          else
            gh pr create \
              --title "chore: onboard SDLC pipeline (project: ${{ inputs.jira_project_key }})" \
              --body-file .github/content/onboarding-pr-body.md \
              --base master \
              --head "$BRANCH"
            echo "PR created for branch: $BRANCH"
          fi

      - name: Run spec-kit check
        run: |
          uvx --from git+https://github.com/github/spec-kit.git@v0.8.6 \
            specify check
