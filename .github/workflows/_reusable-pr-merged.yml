# Reusable PR Merged workflow.
# Triggered when a PR with a jira:* label is merged.
# Closes the linked GitHub issue (if not already auto-closed) and
# transitions the Jira ticket to Done.
#
# Usage in consumer repo:
#   on:
#     pull_request:
#       types: [closed]
#   jobs:
#     call:
#       if: github.event.pull_request.merged == true
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-pr-merged.yml@master
#       secrets: inherit
name: "[Reusable] PR Merged"

on:
  workflow_call:
    secrets:
      COPILOT_PAT:
        required: true
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true

jobs:
  on-merged:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      # ── Step 1: Extract Jira key from PR labels ─────────────────────
      - name: Extract Jira key from PR labels
        id: jira
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          ISSUE_KEY=$(gh api "repos/$OWNER/$REPO/issues/$PR_NUM/labels" \
            --jq '[.[].name | select(startswith("jira:"))] | first // empty' 2>/dev/null \
            | sed 's/^jira://' || true)

          # Fallback: PR title
          if [ -z "$ISSUE_KEY" ]; then
            ISSUE_KEY=$(echo "${{ github.event.pull_request.title }}" | grep -oP '[A-Z]+-\d+' | head -1 || true)
          fi

          if [ -n "$ISSUE_KEY" ]; then
            echo "issue_key=${ISSUE_KEY}" >> "$GITHUB_OUTPUT"
            echo "✅ Jira key: ${ISSUE_KEY}"
          else
            echo "⚠️ No Jira key found — skipping Jira steps."
            echo "issue_key=" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 2: Close linked GitHub issue ──────────────────────────
      - name: Close linked GitHub issue
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          ISSUE_NUM=$(gh pr view "$PR_NUM" --repo "$OWNER/$REPO" --json body --jq '.body' \
            | grep -oP '(?:Closes|Fixes|Resolves)\s*#(\d+)' | grep -oP '\d+' | head -1 || true)

          if [ -z "$ISSUE_NUM" ]; then
            echo "⚠️ No linked GitHub issue found in PR body — skipping."
            exit 0
          fi

          ISSUE_STATE=$(gh issue view "$ISSUE_NUM" --repo "$OWNER/$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
          if [ "$ISSUE_STATE" = "CLOSED" ]; then
            echo "✅ Issue #${ISSUE_NUM} already closed (auto-closed by GitHub on merge)."
          else
            gh issue close "$ISSUE_NUM" --repo "$OWNER/$REPO" \
              --comment "Closed by SDLC pipeline. PR #${PR_NUM} merged."
            echo "✅ Issue #${ISSUE_NUM} closed."
          fi

      # ── Step 3: Transition Jira ticket to Done ──────────────────────
      - name: Transition Jira ticket to Done
        if: steps.jira.outputs.issue_key != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.jira.outputs.issue_key }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          echo "Transitioning Jira ticket ${ISSUE_KEY} to Done..."

          TRANSITIONS=$(curl -s \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions")

          TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r \
            '.transitions[] | select(.name | ascii_downcase == "done") | .id')

          if [ -z "$TRANSITION_ID" ]; then
            echo "⚠️ No 'Done' transition available for ${ISSUE_KEY}. Available:"
            echo "$TRANSITIONS" | jq -r '.transitions[] | "  - \(.name) (id: \(.id))"'
            exit 0
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"transition\": {\"id\": \"${TRANSITION_ID}\"}}" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/transitions")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Jira ticket ${ISSUE_KEY} transitioned to Done."
          else
            echo "⚠️ Jira transition returned HTTP ${HTTP_CODE} for ${ISSUE_KEY}."
          fi

          curl -s -o /dev/null \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"body\": {\"type\": \"doc\", \"version\": 1, \"content\": [{\"type\": \"paragraph\", \"content\": [{\"type\": \"text\", \"text\": \"PR #${PR_NUM} merged. Ticket completed by SDLC pipeline.\"}]}]}}" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${ISSUE_KEY}/comment"
          echo "✅ Jira comment added."
