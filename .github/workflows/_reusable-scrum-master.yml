# Reusable Scrum Master workflow.
# Checks out the calling (consumer) repo for config, SDLCAgents for Node scripts.
#
# Usage in consumer repo:
#   jobs:
#     call:
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-scrum-master.yml@master
#       with:
#         jira_project: MY-PROJECT
#       secrets: inherit
name: "[Reusable] Scrum Master"

on:
  workflow_call:
    inputs:
      jql:
        description: >-
          Optional. Legacy mode — single JQL. If empty: use rules file (rules_path).
        required: false
        type: string
        default: ''
      agent_config_file:
        description: "Legacy mode — agent JSON path (default config/agents/dummy-ticket-agent.json)"
        required: false
        type: string
        default: 'config/agents/dummy-ticket-agent.json'
      rules_path:
        description: "Path to SM rules JSON (relative to consumer repo root)"
        required: false
        type: string
        default: 'config/sm.json'
      taken_status:
        description: "Jira status tickets must be in"
        required: false
        type: string
        default: 'To Do'
      status_to_move_to:
        description: "Jira status after reading the issue"
        required: false
        type: string
        default: 'In Progress'
      limit:
        description: "Global max issues per rule (1–50)"
        required: false
        type: string
        default: '10'
      jira_project:
        description: "Replaces {jiraProject} in rule JQL"
        required: false
        type: string
        default: ''
      ticket_context_depth:
        description: "0=primary only; 1=linked issues+subtasks"
        required: false
        type: string
        default: '1'
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to pull scripts from"
        required: false
        type: string
        default: 'master'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      COPILOT_PAT:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      # ── Step 1: Checkout calling (consumer) repo at workspace root ──────
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      # ── Step 2: Checkout SDLCAgents for Node scripts ────────────────────
      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      # ── Step 3: Node setup + install ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      # ── Step 4: Validate spec-kit in consumer repo ──────────────────────
      - name: Validate Spec-Kit initialization
        env:
          SPECKIT_TARGET_VERSION: "0.4.0"
        run: |
          if [ ! -f ".specify/init-options.json" ]; then
            echo "::error::Spec-Kit is not initialized in this repo."
            echo "::error::Run: uvx --from git+https://github.com/github/spec-kit.git@v${SPECKIT_TARGET_VERSION} specify init --here --ai copilot --script ps --force"
            exit 1
          fi

          CURRENT=$(jq -r '.speckit_version // "0.0.0"' .specify/init-options.json)
          if [ "$CURRENT" != "$SPECKIT_TARGET_VERSION" ]; then
            echo "::error::Spec-Kit version mismatch: found v${CURRENT}, expected v${SPECKIT_TARGET_VERSION}."
            echo "::error::Run: uvx --from git+https://github.com/github/spec-kit.git@v${SPECKIT_TARGET_VERSION} specify init --here --ai copilot --script ps --force"
            exit 1
          fi

          echo "✅ Spec-Kit v${SPECKIT_TARGET_VERSION} initialized"

          MISSING=0
          for f in \
            .github/agents/speckit.specify.agent.md \
            .github/agents/speckit.clarify.agent.md \
            .github/agents/speckit.plan.agent.md \
            .github/agents/speckit.tasks.agent.md \
            .github/agents/speckit.implement.agent.md \
            .github/agents/speckit.analyze.agent.md \
            .github/agents/speckit.constitution.agent.md \
            .github/agents/speckit.checklist.agent.md \
            .github/agents/speckit.taskstoissues.agent.md \
            .github/agents/speckit.orchestrator.agent.md \
            .github/agents/sdlc.pipeline.agent.md \
            .github/agents/code.review.agent.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing agent file: $f"
              MISSING=1
            fi
          done

          for f in \
            .github/prompts/speckit.specify.prompt.md \
            .github/prompts/speckit.clarify.prompt.md \
            .github/prompts/speckit.plan.prompt.md \
            .github/prompts/speckit.tasks.prompt.md \
            .github/prompts/speckit.implement.prompt.md \
            .github/prompts/speckit.analyze.prompt.md \
            .github/prompts/speckit.constitution.prompt.md \
            .github/prompts/speckit.checklist.prompt.md \
            .github/prompts/speckit.taskstoissues.prompt.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing prompt file: $f"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Some agent/prompt files are missing. Run: uvx --from git+https://github.com/github/spec-kit.git@v${SPECKIT_TARGET_VERSION} specify init --here --ai copilot --script ps --force"
            exit 1
          fi

          echo "✅ All agent and prompt files present"

      # ── Step 5: Run Scrum Master (CWD = consumer workspace root) ────────
      # Scripts run from .sdlc-agents/ but process.cwd() = workspace root,
      # so config/sm.json and config/spec-kit/*.json resolve to consumer files.
      - name: Run Scrum Master
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/scrum-agent/scrum-master.ts
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JQL: ${{ inputs.jql }}
          AGENT_CONFIG_FILE: ${{ inputs.agent_config_file }}
          SM_RULES_FILE: ${{ inputs.rules_path }}
          GLOBAL_LIMIT: ${{ inputs.limit }}
          REQUIRED_JIRA_STATUS: ${{ inputs.taken_status }}
          POST_READ_STATUS: ${{ inputs.status_to_move_to }}
          JIRA_PROJECT: ${{ inputs.jira_project }}
          TICKET_CONTEXT_DEPTH: ${{ inputs.ticket_context_depth }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
