# Reusable Scrum Master workflow.
# Checks out the calling (consumer) repo for config, SDLCAgents for Node scripts.
#
# Usage in consumer repo:
#   jobs:
#     call:
#       uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-scrum-master.yml@master
#       with:
#         jira_project: MY-PROJECT
#       secrets: inherit
name: "[Reusable] Scrum Master (Jira)"

on:
  workflow_call:
    inputs:
      jql:
        description: >-
          Optional. Legacy mode — single JQL. If empty: uses config/workflows/scrum-master/scrum-master.config rules.
        required: false
        type: string
        default: ''
      taken_status:
        description: "Jira status tickets must be in"
        required: false
        type: string
        default: 'To Do'
      status_to_move_to:
        description: "Jira status after reading the issue"
        required: false
        type: string
        default: 'In Progress'
      limit:
        description: "Global max issues per rule (1–50)"
        required: false
        type: string
        default: '10'
      jira_project:
        description: "Replaces {jiraProject} in rule JQL"
        required: false
        type: string
        default: ''
      ticket_context_depth:
        description: "0=primary only; 1=linked issues+subtasks"
        required: false
        type: string
        default: '1'
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to pull scripts from"
        required: false
        type: string
        default: 'master'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      COPILOT_PAT:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      contents: read
      actions: write
    steps:
      # ── Step 1: Checkout calling (consumer) repo at workspace root ──────
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      # ── Step 2: Checkout SDLCAgents for Node scripts ────────────────────
      - name: Checkout SDLCAgents (scripts)
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      # ── Step 3: Node setup + install ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install SDLCAgents dependencies
        run: npm ci
        working-directory: .sdlc-agents

      # ── Step 4: Validate spec-kit in consumer repo ──────────────────────
      - name: Validate Spec-Kit version (consumer vs SDLCAgents)
        env:
          SPECKIT_TARGET_VERSION: "0.5.0"
        run: |
          if [ ! -f ".specify/init-options.json" ]; then
            echo "::error::Spec-Kit is not initialized in this repo."
            echo "::error::Run: uvx --from git+https://github.com/github/spec-kit.git@v${SPECKIT_TARGET_VERSION} specify init --here --ai codex --script sh --force"
            exit 1
          fi

          CURRENT=$(jq -r '.speckit_version // "0.0.0"' .specify/init-options.json)
          AGENTS_VERSION=$(jq -r '.speckit_version // "0.0.0"' .sdlc-agents/.specify/init-options.json 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$AGENTS_VERSION" ]; then
            echo "::error::Spec-Kit version mismatch: consumer has v${CURRENT}, SDLCAgents requires v${AGENTS_VERSION}."
            echo "::error::Run: uvx --from git+https://github.com/github/spec-kit.git@v${AGENTS_VERSION} specify init --here --ai codex --script sh --force"
            exit 1
          fi

          echo "✅ Spec-Kit v${CURRENT} (matches SDLCAgents)"

      - name: Validate spec-kit files (agents + skills)
        # Local action path resolves to the *caller* repo; the action lives in SDLCAgents (.sdlc-agents).
        uses: ./.sdlc-agents/.github/actions/check-speckit-prerequisites
        with:
          fail_on_not_ready: 'true'

      # ── Step 5: Run Scrum Master (CWD = consumer workspace root) ────────
      # Scripts run from .sdlc-agents/ but process.cwd() = workspace root,
      # so config/workflows/scrum-master/scrum-master.config and config/spec-kit/*.json resolve to consumer files.
      - name: Run Scrum Master
        run: .sdlc-agents/node_modules/.bin/tsx .sdlc-agents/src/workflows/scrum-master/scrum-master.ts
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JQL: ${{ inputs.jql }}
          AGENT_CONFIG_FILE: config/workflows/ai-teammate/ai-teammate.config
          SM_RULES_FILE: config/workflows/scrum-master/scrum-master.config
          GLOBAL_LIMIT: ${{ inputs.limit }}
          REQUIRED_JIRA_STATUS: ${{ inputs.taken_status }}
          POST_READ_STATUS: ${{ inputs.status_to_move_to }}
          JIRA_PROJECT: ${{ inputs.jira_project }}
          TICKET_CONTEXT_DEPTH: ${{ inputs.ticket_context_depth }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SM_SUMMARY_FILE: ${{ runner.temp }}/sm-summary.md

      - name: Write job summary
        if: always()
        run: |
          if [ -f "${{ runner.temp }}/sm-summary.md" ]; then
            cat "${{ runner.temp }}/sm-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
