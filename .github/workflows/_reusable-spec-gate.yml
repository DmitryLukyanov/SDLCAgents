# Reusable Spec Gate workflow.
#
# Triggered after a speckit step commits speckit-state.json to a feature branch.
# Waits for the Copilot session to finish, then runs an LLM analysis on the
# spec artifacts. Posts "@copilot proceed" if clean, or "HIL required" if
# open questions / clarification markers are found.
#
# The implement step always results in "HIL required" — human must review
# and merge; the gate never auto-proceeds after implementation.
#
# Consumer usage: see .github/consumer-templates/spec-gate.yml
name: "[Reusable] Spec Gate"

on:
  workflow_call:
    inputs:
      sdlc_agents_ref:
        description: "SDLCAgents branch/tag/SHA to use"
        required: false
        type: string
        default: 'master'

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # ── 1. Checkout consumer repo (contains spec artifacts on the feature branch) ──
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      # ── 2. Find open PR for this branch ──────────────────────────────────────────
      - name: Find PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          PR_NUM=$(gh pr list \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUM" ]; then
            echo "::warning::No open PR found for branch ${{ github.ref_name }} — skipping gate"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "Found PR #$PR_NUM"
          fi

      # ── 3. Wait for Copilot session to finish ────────────────────────────────────
      - name: Wait for Copilot session to finish
        if: steps.pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = parseInt('${{ steps.pr.outputs.pr_number }}', 10);

            console.log(`Polling for Copilot check run on PR #${prNumber}...`);

            for (let i = 0; i < 60; i++) {
              // Always fetch the latest head SHA — Copilot may push more commits
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const headSha = pr.head.sha;

              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo,
                ref: headSha,
                check_name: 'copilot',
                per_page: 10,
              });

              const active = checks.check_runs.filter(
                r => r.status === 'in_progress' || r.status === 'queued'
              );
              const completed = checks.check_runs.filter(r => r.status === 'completed');

              if (active.length === 0 && completed.length > 0) {
                console.log(`Copilot check run completed on ${headSha} — proceeding`);
                break;
              }

              if (active.length === 0 && completed.length === 0) {
                if (i >= 5) {
                  console.log(`No Copilot check runs found after ${i + 1} attempts — proceeding`);
                  break;
                }
              }

              console.log(`Waiting for Copilot (active=${active.length}) — attempt ${i + 1}/60`);
              await new Promise(r => setTimeout(r, 10_000));
            }

      # ── 4. Resolve FEATURE_DIR from branch name ──────────────────────────────────
      - name: Resolve feature directory
        id: paths
        if: steps.pr.outputs.pr_number != ''
        run: |
          BRANCH="${{ github.ref_name }}"
          # Strip branch-type prefix: feature/, spec/, copilot/
          SHORT="${BRANCH#*/}"
          # Strip sequential number prefix (e.g. "001-") or timestamp prefix (e.g. "20260319-143022-")
          SHORT=$(echo "$SHORT" | sed 's/^[0-9]\{3\}-//' | sed 's/^[0-9]\{8\}-[0-9]\{6\}-//')
          FEATURE_DIR=".specify/features/$SHORT"
          echo "feature_dir=$FEATURE_DIR" >> "$GITHUB_OUTPUT"
          echo "Resolved FEATURE_DIR=$FEATURE_DIR"

      # ── 5. Read completed step from speckit-state.json ───────────────────────────
      - name: Read speckit step from state file
        id: step
        if: steps.pr.outputs.pr_number != ''
        run: |
          STATE_FILE="${{ steps.paths.outputs.feature_dir }}/speckit-state.json"
          if [ ! -f "$STATE_FILE" ]; then
            echo "::error::State file not found: $STATE_FILE"
            exit 1
          fi
          # The last completed step is the final entry in completedSteps
          STEP=$(cat "$STATE_FILE" | python3 -c "
          import json, sys
          s = json.load(sys.stdin)
          steps = s.get('completedSteps', [])
          print(steps[-1] if steps else '')
          ")
          if [ -z "$STEP" ]; then
            echo "::error::Could not read completedSteps from $STATE_FILE"
            exit 1
          fi
          echo "step=$STEP" >> "$GITHUB_OUTPUT"
          echo "Completed step: $STEP"

      # ── 6. Checkout SDLCAgents for the TypeScript runner ─────────────────────────
      - name: Checkout SDLCAgents
        if: steps.pr.outputs.pr_number != ''
        uses: actions/checkout@v4
        with:
          repository: DmitryLukyanov/SDLCAgents
          ref: ${{ inputs.sdlc_agents_ref }}
          path: .sdlc-agents
          token: ${{ secrets.COPILOT_PAT }}

      # ── 7. Node setup ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.pr.outputs.pr_number != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .sdlc-agents/package-lock.json

      - name: Install dependencies
        if: steps.pr.outputs.pr_number != ''
        run: npm ci
        working-directory: .sdlc-agents

      # ── 8. Run spec gate analysis and post PR comment ────────────────────────────
      - name: Run spec gate
        if: steps.pr.outputs.pr_number != ''
        run: node --import .sdlc-agents/node_modules/tsx/dist/esm/index.cjs .sdlc-agents/src/workflows/spec-gate/spec-gate-agent.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SPECKIT_STEP: ${{ steps.step.outputs.step }}
          FEATURE_DIR: ${{ steps.paths.outputs.feature_dir }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          GATE_MODEL: ${{ vars.GATE_MODEL }}
