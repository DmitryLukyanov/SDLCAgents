# Generic agent runner: config_file + encoded_config + concurrency_key.
# Scrum Master dispatches this workflow; agent-runner loads JSON and runs the right script.
# When the agent JSON enables specKit.cliEnabled, the real specify-cli is installed and
# spec-kit commands (clarify → plan → tasks) run via GitHub Copilot CLI.
name: AI Teammate

concurrency:
  group: ai-teammate-${{ inputs.concurrency_key }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      concurrency_key:
        description: Jira issue key (used for concurrency grouping; same as ticket key)
        required: true
        type: string
      config_file:
        description: Path to agent JSON in repo (e.g. config/agents/dummy-ticket-agent.json)
        required: true
        type: string
      encoded_config:
        description: >-
          URL-encoded JSON { "params": { "inputJql": "key = PROJ-1", "customParams": { ... } } }
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Phase 1: Node prepares Jira context + manifest ──────────────────
      # When cliEnabled, agent-runner writes spec-output/<KEY>/manifest.json
      # instead of headless template files.
      - name: Run agent (Spec Kit context + configured runner)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}
        run: npm run agent-runner

      # ── Phase 2: Read manifest to decide CLI mode ───────────────────────
      - name: Read spec-kit manifest
        id: manifest
        run: |
          MANIFEST="spec-output/${{ inputs.concurrency_key }}/manifest.json"
          if [ -f "$MANIFEST" ]; then
            echo "cli_enabled=true" >> "$GITHUB_OUTPUT"
            echo "output_dir=$(jq -r .outputDir "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "context_file=$(jq -r .contextFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "constitution_file=$(jq -r .constitutionFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "agent=$(jq -r .agent "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "script_type=$(jq -r .scriptType "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "issue_key=$(jq -r .issueKey "$MANIFEST")" >> "$GITHUB_OUTPUT"
          else
            echo "cli_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 3: Install Python + uv + specify-cli ─────────────────────
      - name: Set up Python
        if: steps.manifest.outputs.cli_enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: pip install uv

      - name: Install specify-cli
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: |
          uv tool install specify-cli --force \
            --from "git+https://github.com/github/spec-kit.git@${{ steps.manifest.outputs.version }}"

      # ── Phase 4: Initialize spec-kit if needed ──────────────────────────
      - name: Initialize spec-kit (conditional)
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: |
          if [ ! -d ".speckit" ] && [ ! -f "specify.toml" ]; then
            echo "Spec-kit not initialized — running specify init..."
            echo "y" | specify init \
              --ai ${{ steps.manifest.outputs.agent }} \
              --script ${{ steps.manifest.outputs.script_type }} \
              --here
          else
            echo "Spec-kit already initialized — skipping init."
          fi

      # ── Phase 5: Run spec-kit shell scripts to scaffold feature ─────────
      # specify init creates .github/agents/*.agent.md (Copilot agent prompts)
      # and .specify/scripts/bash/*.sh (setup scripts). We run the scripts to
      # create the branch + spec/plan/task templates, then seed with Jira context.
      - name: Create spec-kit feature branch and scaffolding
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: |
          ISSUE_KEY="${{ steps.manifest.outputs.issue_key }}"
          CONTEXT_FILE="${{ steps.manifest.outputs.context_file }}"

          # Use spec-kit's create-new-feature script to scaffold the feature
          SCRIPT=".specify/scripts/bash/create-new-feature.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            bash "$SCRIPT" --json --short-name "${ISSUE_KEY}" "${ISSUE_KEY}" || true
          else
            echo "⚠️ create-new-feature.sh not found, creating specs dir manually"
            mkdir -p "specs/${ISSUE_KEY}"
          fi

          # Find the feature directory (spec-kit creates specs/<branch-name>/)
          FEATURE_DIR=$(find specs -maxdepth 1 -type d -name "*${ISSUE_KEY}*" | head -1)
          if [ -z "$FEATURE_DIR" ]; then
            FEATURE_DIR="specs/${ISSUE_KEY}"
            mkdir -p "$FEATURE_DIR"
          fi
          echo "Feature dir: $FEATURE_DIR"

          # Seed the spec file with Jira context
          if [ -f "$CONTEXT_FILE" ]; then
            cp "$CONTEXT_FILE" "$FEATURE_DIR/spec.md"
            echo "Seeded $FEATURE_DIR/spec.md with Jira context"
          fi

          # Copy constitution
          CONSTITUTION="${{ steps.manifest.outputs.constitution_file }}"
          if [ -f "$CONSTITUTION" ]; then
            mkdir -p memory
            cp "$CONSTITUTION" memory/constitution.md
            echo "Copied constitution to memory/constitution.md"
          fi

          echo "feature_dir=$FEATURE_DIR" >> "$GITHUB_OUTPUT"

      # Run plan setup script if available
      - name: Set up plan template
        id: scaffold
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: |
          SCRIPT=".specify/scripts/bash/setup-plan.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            bash "$SCRIPT" --json || true
          else
            echo "⚠️ setup-plan.sh not found — skipping plan scaffolding"
          fi

      # ── Phase 6: Invoke Copilot Coding Agent via issue assignment ───────
      # Spec-kit commands are AI agent prompts (in .github/agents/*.agent.md).
      # We create a GitHub issue and assign Copilot to drive the spec workflow.
      - name: Create issue and assign Copilot
        if: steps.manifest.outputs.cli_enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_KEY="${{ steps.manifest.outputs.issue_key }}"

          # Build the issue body with spec-kit instructions for Copilot
          BODY=$(cat <<'ISSUE_EOF'
          ## Spec-Kit Workflow for ISSUE_PLACEHOLDER

          Run the following spec-kit agent commands in order:

          1. `@speckit.clarify` — Review the spec in the feature directory and identify ambiguities
          2. `@speckit.plan` — Create a technical implementation plan
          3. `@speckit.tasks` — Break the plan into actionable tasks
          4. `@speckit.implement` — Execute the tasks and produce code changes

          The feature spec has been seeded with Jira ticket context in the `specs/` directory.
          Commit all generated artifacts and open a PR when done.
          ISSUE_EOF
          )
          BODY="${BODY//ISSUE_PLACEHOLDER/$ISSUE_KEY}"

          # Create the issue and assign copilot
          ISSUE_URL=$(gh issue create \
            --title "Spec-Kit: ${ISSUE_KEY}" \
            --body "$BODY" \
            --assignee "@me" \
            2>&1) || true
          echo "Created issue: $ISSUE_URL"

          # Try to assign Copilot (copilot-swe-agent) to the issue
          # This triggers Copilot Coding Agent to pick up the agent definitions
          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$' || true)
          if [ -n "$ISSUE_NUM" ]; then
            gh issue edit "$ISSUE_NUM" --add-assignee "copilot-swe-agent[bot]" 2>/dev/null || \
              echo "⚠️ Could not assign Copilot — enable Copilot Coding Agent in repo settings"
          fi

      # ── Phase 7: Collect outputs ────────────────────────────────────────
      - name: Copy spec-kit outputs to artifact dir
        if: steps.manifest.outputs.cli_enabled == 'true'
        run: |
          OUTPUT_DIR="${{ steps.manifest.outputs.output_dir }}"
          cp -r specs/* "$OUTPUT_DIR/" 2>/dev/null || true
          cp -r memory/* "$OUTPUT_DIR/" 2>/dev/null || true
          echo "Copied spec-kit outputs to $OUTPUT_DIR"

      # ── Phase 8: Create PR with spec-kit artifacts ──────────────────────
      - name: Create branch and PR
        if: steps.manifest.outputs.cli_enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_KEY="${{ steps.manifest.outputs.issue_key }}"
          BRANCH="spec-kit/${ISSUE_KEY}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add specs/ spec-output/

          if git diff --cached --quiet; then
            echo "No changes to commit — skipping PR."
            exit 0
          fi

          git commit -m "spec-kit: generate artifacts for ${ISSUE_KEY}"
          git push --force-with-lease origin "$BRANCH"

          # Create PR only if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for branch $BRANCH — updated with new commits."
          else
            gh pr create \
              --title "Spec Kit: ${ISSUE_KEY}" \
              --body "Auto-generated spec-kit artifacts for Jira issue **${ISSUE_KEY}**." \
              --base master \
              --head "$BRANCH"
          fi

      # ── Phase 9: Upload artifacts ───────────────────────────────────────
      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
