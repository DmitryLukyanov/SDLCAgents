# Generic agent runner: config_file + encoded_config + concurrency_key.
# Scrum Master dispatches this workflow; agent-runner loads JSON and runs the right script.
#
# When specKit.cliEnabled is true:
#   1. Node prepares Jira context (context.md, constitution, manifest)
#   2. Creates a GitHub Issue with full Jira context + spec-kit instructions
#   3. Assigns Copilot Coding Agent to the issue
#   4. Copilot picks up the issue asynchronously, reads .github/agents/*.agent.md,
#      runs the spec-kit workflow (specify → clarify → plan → tasks → implement),
#      and opens its own PR with the implementation.
#
# Prerequisites:
#   - Copilot Coding Agent enabled: Settings → Copilot → Coding agent
#   - .github/agents/*.agent.md committed to master (run `specify init --ai copilot` once)
#   - .github/workflows/copilot-setup-steps.yml committed to master
name: AI Teammate

concurrency:
  group: ai-teammate-${{ inputs.concurrency_key }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      concurrency_key:
        description: Jira issue key (used for concurrency grouping; same as ticket key)
        required: true
        type: string
      config_file:
        description: Path to agent JSON in repo (e.g. config/agents/dummy-ticket-agent.json)
        required: true
        type: string
      encoded_config:
        description: >-
          URL-encoded JSON { "params": { "inputJql": "key = PROJ-1", "customParams": { ... } } }
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Phase 1: Node prepares Jira context + manifest ──────────────────
      - name: Run agent (Spec Kit context + configured runner)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}
        run: npm run agent-runner

      # ── Phase 2: Read manifest to decide CLI mode ───────────────────────
      - name: Read spec-kit manifest
        id: manifest
        run: |
          MANIFEST="spec-output/${{ inputs.concurrency_key }}/manifest.json"
          if [ -f "$MANIFEST" ]; then
            echo "cli_enabled=true" >> "$GITHUB_OUTPUT"
            echo "output_dir=$(jq -r .outputDir "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "context_file=$(jq -r .contextFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "constitution_file=$(jq -r .constitutionFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "agent=$(jq -r .agent "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "script_type=$(jq -r .scriptType "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "issue_key=$(jq -r .issueKey "$MANIFEST")" >> "$GITHUB_OUTPUT"
          else
            echo "cli_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 3: Create GitHub Issue and assign Copilot Coding Agent ────
      # Copilot Coding Agent is async: it picks up the issue, reads
      # .github/agents/*.agent.md from master, and creates its own PR
      # with the full spec-kit workflow output (specify → implement).
      - name: Create issue and assign Copilot Coding Agent
        if: steps.manifest.outputs.cli_enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_KEY="${{ steps.manifest.outputs.issue_key }}"

          # Read Jira context to embed in the issue
          CONTEXT_FILE="${{ steps.manifest.outputs.context_file }}"
          JIRA_CONTEXT=""
          if [ -f "$CONTEXT_FILE" ]; then
            JIRA_CONTEXT=$(cat "$CONTEXT_FILE")
          fi

          # Build the issue body with Jira content + spec-kit instructions
          BODY=$(cat <<ISSUE_EOF
          ## Spec-Kit Workflow for ${ISSUE_KEY}

          ### Jira Ticket Context

          ${JIRA_CONTEXT}

          ### Instructions

          Run the following spec-kit agent commands in order:

          1. \`@speckit.specify\` — Create the feature specification from the Jira context above
          2. \`@speckit.clarify\` — Review the spec and identify ambiguities
          3. \`@speckit.plan\` — Create a technical implementation plan
          4. \`@speckit.tasks\` — Break the plan into actionable tasks
          5. \`@speckit.implement\` — Execute the tasks and produce code changes

          The feature spec has been seeded in the \`specs/\` directory.
          Commit all generated artifacts and open a PR when done.
          ISSUE_EOF
          )

          # Check if an issue for this ticket already exists
          EXISTING_ISSUE=$(gh issue list \
            --search "Spec-Kit: ${ISSUE_KEY} in:title" \
            --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Issue #${EXISTING_ISSUE} already exists for ${ISSUE_KEY} — updating body."
            gh issue edit "$EXISTING_ISSUE" --body "$BODY"
            ISSUE_NUM="$EXISTING_ISSUE"
          else
            ISSUE_URL=$(gh issue create \
              --title "Spec-Kit: ${ISSUE_KEY}" \
              --body "$BODY" \
              2>&1) || true
            echo "Created issue: $ISSUE_URL"
            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$' || true)
          fi

          if [ -z "$ISSUE_NUM" ]; then
            echo "⚠️ Could not determine issue number — skipping Copilot assignment"
            exit 0
          fi

          # Assign Copilot Coding Agent to trigger it
          echo "Assigning Copilot Coding Agent to issue #${ISSUE_NUM}..."
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUM}/assignees" \
            -f "assignees[]=copilot-swe-agent[bot]" 2>&1 || {
            echo "⚠️ 'copilot-swe-agent[bot]' failed — trying 'copilot'..."
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/${ISSUE_NUM}/assignees" \
              -f "assignees[]=copilot" 2>&1 || \
              echo "⚠️ Could not assign Copilot. Enable it: Settings → Copilot → Coding agent"
          }

          echo "✅ Issue #${ISSUE_NUM} created and Copilot assigned. Copilot will create a PR with implementation."

      # ── Phase 4: Upload context artifacts for reference ─────────────────
      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
