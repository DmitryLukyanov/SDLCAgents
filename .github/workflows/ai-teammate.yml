# Generic agent runner: config_file + encoded_config + concurrency_key.
# Scrum Master dispatches this workflow; agent-runner loads JSON and runs the right script.
#
# When specKit.cliEnabled is true:
#   1. Node prepares Jira context (context.md, constitution, manifest)
#   2. Creates a GitHub Issue with full Jira context + spec-kit instructions
#   3. Assigns Copilot Coding Agent to the issue
#   4. Copilot picks up the issue asynchronously, reads .github/agents/*.agent.md,
#      runs the spec-kit workflow (specify → clarify → plan → tasks → implement),
#      and opens its own PR with the implementation.
#
# Prerequisites:
#   - Copilot Coding Agent enabled: Settings → Copilot → Coding agent
#   - .github/agents/speckit.*.agent.md + .github/prompts/speckit.*.prompt.md committed
#     to the default branch. Generate once with:
#       uvx --from git+https://github.com/github/spec-kit.git@v0.4.0 specify init --here
#   - .github/workflows/copilot-setup-steps.yml committed to master
name: AI Teammate
run-name: "AI Teammate — ${{ inputs.concurrency_key }}"

concurrency:
  group: ai-teammate-${{ inputs.concurrency_key }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      concurrency_key:
        description: Jira issue key (used for concurrency grouping; same as ticket key)
        required: true
        type: string
      config_file:
        description: Path to agent JSON in repo (e.g. config/agents/dummy-ticket-agent.json)
        required: true
        type: string
      encoded_config:
        description: >-
          URL-encoded JSON { "params": { "inputJql": "key = PROJ-1", "customParams": { ... } } }
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      # ── Gate: spec-kit agents + prompts must exist in the repo ─────────
      - name: Check spec-kit prerequisites
        id: speckit_check
        run: |
          MISSING=0
          for f in \
            .github/agents/speckit.specify.agent.md \
            .github/agents/speckit.implement.agent.md \
            .github/prompts/speckit.specify.prompt.md \
            .github/prompts/speckit.implement.prompt.md; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "speckit_ready=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "⚠️ Spec-kit agent/prompt files are missing from the repo."
            echo "   Run once and commit to the default branch:"
            echo "   uvx --from git+https://github.com/github/spec-kit.git@v0.4.0 specify init --here"
          else
            echo "speckit_ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ Spec-kit agent and prompt files found."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Phase 1: Node prepares Jira context + manifest ──────────────────
      - name: Run agent (Spec Kit context + configured runner)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}
        run: npm run agent-runner

      # ── Phase 2: Read manifest to decide CLI mode ───────────────────────
      - name: Read spec-kit manifest
        id: manifest
        run: |
          MANIFEST="spec-output/${{ inputs.concurrency_key }}/manifest.json"
          if [ -f "$MANIFEST" ]; then
            echo "cli_enabled=true" >> "$GITHUB_OUTPUT"
            echo "output_dir=$(jq -r .outputDir "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "context_file=$(jq -r .contextFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "constitution_file=$(jq -r .constitutionFile "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "agent=$(jq -r .agent "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "script_type=$(jq -r .scriptType "$MANIFEST")" >> "$GITHUB_OUTPUT"
            echo "issue_key=$(jq -r .issueKey "$MANIFEST")" >> "$GITHUB_OUTPUT"
          else
            echo "cli_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 3a: Build the GitHub Issue body ──────────────────────────
      - name: Build issue body
        id: issue_body
        if: steps.manifest.outputs.cli_enabled == 'true' && steps.speckit_check.outputs.speckit_ready == 'true'
        env:
          CONTEXT_FILE: ${{ steps.manifest.outputs.context_file }}
          ISSUE_KEY: ${{ steps.manifest.outputs.issue_key }}
        run: |
          JIRA_CONTEXT=""
          if [ -f "$CONTEXT_FILE" ]; then
            JIRA_CONTEXT=$(cat "$CONTEXT_FILE")
          fi

          GLOBAL_DIRECTIVE=$(jq -r '.globalDirective // empty' config/spec-kit/defaults.json)
          DIRECTIVE_PART=""
          if [ -n "$GLOBAL_DIRECTIVE" ]; then
            ESC_DIRECTIVE=$(printf '%s\n' "$GLOBAL_DIRECTIVE" | sed 's/\\/\\\\/g; s/"/\\"/g')
            DIRECTIVE_PART="${ESC_DIRECTIVE} — "
          fi

          cat <<ISSUE_EOF > "$RUNNER_TEMP/issue-body.md"
          ## Spec-Kit Workflow for ${ISSUE_KEY}

          ### Jira Ticket Context

          ${JIRA_CONTEXT}

          ### Instructions

          Run the spec-kit steps below **in order**. Execute each \`@speckit.*\` command before moving to the next; do not skip phases or replace this flow with ad-hoc exploration alone.

          Each line is \`@speckit.*\` followed by one quoted argument: when a global directive is configured it appears first, then an em dash, then the step text (suitable to pass as a single argument after the agent name).

          1. \`@speckit.specify\` "${DIRECTIVE_PART}Create the feature specification from the Jira context above"
          2. \`@speckit.clarify\` "${DIRECTIVE_PART}Review the spec and identify ambiguities"
          3. \`@speckit.plan\` "${DIRECTIVE_PART}Create a technical implementation plan"
          4. \`@speckit.tasks\` "${DIRECTIVE_PART}Break the plan into actionable tasks"
          5. \`@speckit.implement\` "${DIRECTIVE_PART}Execute the tasks and produce code changes"

          The feature spec has been seeded in the \`specs/\` directory.
          Commit all generated artifacts and open a PR when done.
          ISSUE_EOF

      # ── Phase 3b: Create or update the GitHub Issue ────────────────────
      - name: Create or update GitHub Issue
        id: issue
        if: steps.manifest.outputs.cli_enabled == 'true' && steps.speckit_check.outputs.speckit_ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_KEY: ${{ steps.manifest.outputs.issue_key }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          EXISTING_ISSUE=$(gh issue list \
            --search "Spec-Kit: ${ISSUE_KEY} in:title" \
            --state open \
            --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Issue #${EXISTING_ISSUE} already exists for ${ISSUE_KEY} — updating body."
            gh issue edit "$EXISTING_ISSUE" --body-file "$RUNNER_TEMP/issue-body.md"
            echo "issue_number=$EXISTING_ISSUE" >> "$GITHUB_OUTPUT"
          else
            ISSUE_URL=$(gh issue create \
              --title "Spec-Kit: ${ISSUE_KEY}" \
              --body-file "$RUNNER_TEMP/issue-body.md" \
              2>&1) || true
            echo "Created issue: $ISSUE_URL"
            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$' || true)
            if [ -z "$ISSUE_NUM" ]; then
              echo "::error::Could not determine issue number"
              exit 1
            fi
            echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 3c: Discover Copilot bot ID ──────────────────────────────
      - name: Discover Copilot bot ID
        id: copilot_bot
        if: steps.issue.outputs.issue_number
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          GQL_FEATURES: "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection"
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          QUERY_RESULT=$(gh api graphql \
            -H "$GQL_FEATURES" \
            -f query='
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  id
                  suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                    nodes {
                      login
                      __typename
                      ... on Bot { id }
                      ... on User { id }
                    }
                  }
                }
              }
            ' -f owner="$OWNER" -f repo="$REPO" 2>&1) || {
            echo "::error::GraphQL suggestedActors query failed: $QUERY_RESULT"
            echo "Ensure COPILOT_PAT secret is a PAT from a Copilot-enabled user with repo scope."
            exit 1
          }

          REPO_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.id')
          BOT_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.suggestedActors.nodes[] | select(.login == "copilot-swe-agent") | .id')

          if [ -z "$BOT_ID" ] || [ "$BOT_ID" = "null" ]; then
            echo "::error::copilot-swe-agent not found. Enable Copilot Coding Agent in Settings → Copilot."
            exit 1
          fi

          echo "Found copilot-swe-agent bot ID: $BOT_ID (repo ID: $REPO_ID)"
          echo "bot_id=$BOT_ID" >> "$GITHUB_OUTPUT"
          echo "repo_id=$REPO_ID" >> "$GITHUB_OUTPUT"

      # ── Phase 3d: Assign Copilot Coding Agent to the issue ─────────────
      - name: Assign Copilot to issue
        if: steps.copilot_bot.outputs.bot_id
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          GQL_FEATURES: "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection"
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          ISSUE_NUM="${{ steps.issue.outputs.issue_number }}"
          BOT_ID="${{ steps.copilot_bot.outputs.bot_id }}"
          REPO_ID="${{ steps.copilot_bot.outputs.repo_id }}"

          # Get the issue's GraphQL node ID
          ISSUE_NODE_ID=$(gh api graphql \
            -H "$GQL_FEATURES" \
            -f query='
              query($owner: String!, $repo: String!, $num: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $num) { id }
                }
              }
            ' -f owner="$OWNER" -f repo="$REPO" -F num="$ISSUE_NUM" \
            --jq '.data.repository.issue.id' 2>&1)

          # Assign Copilot to the issue
          ASSIGN_RESULT=$(gh api graphql \
            -H "$GQL_FEATURES" \
            -f query='
              mutation($issueId: ID!, $botId: ID!, $repoId: ID!) {
                replaceActorsForAssignable(input: {
                  assignableId: $issueId
                  actorIds: [$botId]
                  agentAssignment: {
                    targetRepositoryId: $repoId
                    baseRef: "master"
                  }
                }) {
                  assignable {
                    ... on Issue {
                      id
                      title
                      assignees(first: 5) { nodes { login } }
                    }
                  }
                }
              }
            ' -f issueId="$ISSUE_NODE_ID" -f botId="$BOT_ID" -f repoId="$REPO_ID" 2>&1) || {
            echo "::error::Assignment mutation failed: $ASSIGN_RESULT"
            exit 1
          }

          ASSIGNEE=$(echo "$ASSIGN_RESULT" | jq -r '.data.replaceActorsForAssignable.assignable.assignees.nodes[0].login // empty')
          if [ -n "$ASSIGNEE" ]; then
            echo "✅ Copilot assigned to issue #${ISSUE_NUM} (assignee: $ASSIGNEE)"
          else
            echo "::warning::Assignment response unexpected:"
            echo "$ASSIGN_RESULT" | jq '.' 2>/dev/null || echo "$ASSIGN_RESULT"
          fi

      # ── Phase 4: Upload context artifacts for reference ─────────────────
      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
