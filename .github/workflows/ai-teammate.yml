# Generic agent runner: config_file + encoded_config + concurrency_key.
# Scrum Master dispatches this workflow; agent-runner loads JSON and runs the right script.
name: AI Teammate

concurrency:
  group: ai-teammate-${{ inputs.concurrency_key }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      concurrency_key:
        description: Jira issue key (used for concurrency grouping; same as ticket key)
        required: true
        type: string
      config_file:
        description: Path to agent JSON in repo (e.g. config/agents/dummy-ticket-agent.json)
        required: true
        type: string
      encoded_config:
        description: >-
          URL-encoded JSON { "params": { "inputJql": "key = PROJ-1", "customParams": { ... } } }
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Spec Kit phases (constitution → specify/spec.md → plan → tasks) run inside agent-runner
      # when the agent JSON enables params.specKit (see config/agents/*.json).
      - name: Run agent (Spec Kit artifacts + configured runner)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFIG_FILE: ${{ inputs.config_file }}
          ENCODED_CONFIG: ${{ inputs.encoded_config }}
        run: npm run agent-runner

      - name: Upload Spec Kit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-kit-${{ inputs.concurrency_key }}
          path: spec-output/
          if-no-files-found: ignore
