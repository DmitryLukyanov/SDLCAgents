# Copilot Coding Agent environment setup.
# This workflow configures the environment that Copilot uses when
# working on issues assigned to it. It runs before Copilot starts coding.
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and specify-cli
        run: |
          pip install uv
          uv tool install specify-cli --force \
            --from "git+https://github.com/github/spec-kit.git@v0.4.0"

      - name: Initialize spec-kit if needed
        run: |
          if [ ! -d ".speckit" ] && [ ! -f "specify.toml" ]; then
            echo "y" | specify init --ai copilot --script sh --here
          fi
