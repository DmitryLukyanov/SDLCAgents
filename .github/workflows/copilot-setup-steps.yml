# Copilot Coding Agent environment setup.
# This workflow configures the environment that Copilot uses when
# working on issues assigned to it. It runs before Copilot starts coding.
#
# Prerequisites committed to the default branch BEFORE Copilot runs:
#   - .github/agents/speckit.*.agent.md
#   - .github/prompts/speckit.*.prompt.md
# Generate once with:
#   uvx --from git+https://github.com/github/spec-kit.git@v0.4.0 specify init --here
#
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
