# Mark Copilot PR Ready — fires when Copilot Coding Agent finishes.
# Marks the PR as ready, approves, merges, closes the linked issue,
# and transitions the Jira ticket to Done.
# Delegates all logic to the shared SDLCAgents reusable workflow.
name: Mark Copilot PR Ready
run-name: "Mark PR Ready — ${{ github.event.workflow_run.head_branch }}"

on:
  workflow_run:
    workflows: ["Copilot coding agent"]
    types: [completed]

jobs:
  call:
    # Only proceed if the Copilot agent run succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-mark-pr-ready.yml@master
    secrets: inherit
