# Scrum Master — dispatches AI Teammate for each matching Jira ticket.
# Delegates all logic to the shared SDLCAgents reusable workflow.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   JIRA_BASE_URL    — https://yourorg.atlassian.net
#   JIRA_EMAIL       — your-jira-email@example.com
#   JIRA_API_TOKEN   — Jira API token
#   COPILOT_PAT      — GitHub Classic PAT with repo + workflow + read:org scopes
name: Scrum Master
run-name: "Scrum Master — ${{ inputs.rules_path || inputs.jql || 'default rules' }}"

concurrency:
  group: scrum-master-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      jql:
        description: >-
          Optional. Legacy mode — single JQL. If empty: use rules file (rules_path).
        required: false
        type: string
      agent_config_file:
        description: "Legacy mode — agent JSON path"
        required: false
        default: config/agents/dummy-ticket-agent.json
        type: string
      rules_path:
        description: "Path to SM rules JSON"
        required: false
        default: config/sm.json
        type: string
      taken_status:
        description: "Jira status tickets must be in"
        required: false
        default: 'To Do'
        type: string
      status_to_move_to:
        description: "Jira status after reading the issue"
        required: false
        default: 'In Progress'
        type: string
      limit:
        description: "Max issues per rule (1–50)"
        required: false
        default: '10'
        type: string
      jira_project:
        description: "Replaces {jiraProject} in rule JQL"
        required: false
        type: string
      ticket_context_depth:
        description: "0=primary only; 1=linked issues+subtasks"
        required: false
        default: '1'
        type: string

jobs:
  call:
    permissions:
      contents: read
      actions: write
    uses: DmitryLukyanov/SDLCAgents/.github/workflows/_reusable-scrum-master.yml@master
    with:
      jql: ${{ inputs.jql || '' }}
      agent_config_file: ${{ inputs.agent_config_file || 'config/agents/dummy-ticket-agent.json' }}
      rules_path: ${{ inputs.rules_path || 'config/sm.json' }}
      taken_status: ${{ inputs.taken_status || 'To Do' }}
      status_to_move_to: ${{ inputs.status_to_move_to || 'In Progress' }}
      limit: ${{ inputs.limit || '10' }}
      jira_project: ${{ inputs.jira_project || '' }}
      ticket_context_depth: ${{ inputs.ticket_context_depth || '1' }}
    secrets: inherit
